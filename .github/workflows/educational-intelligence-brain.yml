name: Educational Intelligence Brain

# Phase 118 — continuous Educational Intelligence Engine.
# Purpose: publish ONE evergreen institutional educational article per session
# day to the separate /articles/ pillar, driven by the existing topic engine
# (build-educational-topics: rotation, cooldown, eligibility, anti-repetition).
# Concepts are deterministic, distinct, source-grounded explainers — NOT beginner
# fluff, listicles, retail TA, signals or investment advice. Honest self-gate
# when no eligible covered concept remains. Kept distinct from market-news /
# market-structure / market-outlook.
#
# Social posting preview-only by default (ENABLE_*_POSTING flags default false);
# Telegram stays URL-200 gated + dry-run unless ENABLE_TELEGRAM_PUBLISH=='true'.

on:
  workflow_dispatch:
  schedule:
    # Once per session day, staggered after the research + structure brains.
    - cron: '45 15 * * 1-5'

permissions:
  contents: write
  actions: write

concurrency:
  group: educational-intelligence-brain
  cancel-in-progress: false

env:
  ENABLE_X_POSTING: 'false'
  ENABLE_FACEBOOK_POSTING: 'false'
  ENABLE_INSTAGRAM_POSTING: 'false'
  ENABLE_LINKEDIN_POSTING: 'false'

jobs:
  educational-intelligence-brain:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh topic engine + publish educational article
        id: publish
        run: |
          node tools/build-educational-topics.js --write
          node tools/build-educational-visuals.js --write
          # Capture the published slug (empty when self-gated) for controlled Telegram.
          PUB=$(node tools/generate-educational-article.js --write 2>&1); echo "$PUB"
          SLUG=$(echo "$PUB" | grep -oE 'published /articles/[^ ]+\.html' | head -1 | sed -E 's#.*/##; s#\.html$##') || true
          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"
          node tools/generate-articles-index.js --write
          node tools/generate-seo-sitemaps.js

      - name: Refresh social distribution (preview-only)
        run: |
          node tools/build-distribution-plan.js --write

      - name: Validate
        run: |
          npm run check:educational-articles
          npm run check:educational-rotation
          npm run check:educational-concept-library
          npm run check:educational-visuals
          npm run check:reading-flow
          npm run check:telegram-activation
          npm run check:article-pairs
          npm run check:bilingual-structure
          npm run check:ar-rtl
          npm run check:language-purity
          npm run check:header-runtime-integrity
          npm run check:seo
          npm run check:indexing
          npm run check:social-meta
          npm run check:no-orphan-public-files
          npm run check:distribution-plan

      - name: Commit refreshed surface (only when changed)
        run: |
          git config user.name "tradealphaai-educational-intelligence-brain"
          git config user.email "actions@users.noreply.github.com"

          # Stage every path this brain may regenerate: the /articles/ pillar
          # (EN + AR), educational topic/visual artifacts, distribution plan,
          # article registry, and all sitemaps + robots. Homepage files remain
          # exclusively owned by homepage-feed.yml.
          INTENDED="articles/ ar/articles/ \
            data/intelligence/educational-topics.json data/visual/educational-explainers.json \
            data/visual/educational-explainers/ data/insights/article-registry.json \
            data/social/distribution-plan.json \
            sitemap.xml sitemap-core.xml sitemap-ar.xml sitemap-stocks.xml sitemap-etfs.xml \
            sitemap-compare.xml sitemap-insights.xml sitemap-market.xml robots.txt"
          stage_intended() { for p in $INTENDED; do [ -e "$p" ] && git add -A -- "$p" || true; done; }
          stage_intended

          UNRELATED=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            f="${line:3}"
            case "$f" in
              articles/*|ar/articles/*|data/intelligence/educational-topics.json|data/visual/educational-explainers.json|data/visual/educational-explainers/*|data/insights/article-registry.json|data/social/distribution-plan.json|sitemap*.xml|robots.txt) ;;
              *) UNRELATED="${UNRELATED}${f}\n" ;;
            esac
          done <<< "$(git status --porcelain --untracked-files=all)"
          if [ -n "$UNRELATED" ]; then
            echo "[educational] ERROR: changes outside intended paths — refusing to push partial state:"
            printf '%b' "$UNRELATED" | sed 's/^/  - /'
            exit 1
          fi

          echo "[educational] === staged diff summary ==="; git diff --cached --stat
          if git diff --cached --quiet; then
            echo "[educational] no changes — nothing to commit"
            exit 0
          fi
          git commit -m "Educational intelligence brain: $(date -u +'%Y-%m-%d %H:%M') UTC"

          for attempt in 1 2 3 4 5; do
            git fetch origin main
            if git rebase origin/main; then
              if ! git diff --quiet || ! git diff --cached --quiet; then
                echo "[educational] residual changes after rebase — regenerating shared surfaces + restaging"
                node tools/generate-articles-index.js --write
                node tools/generate-seo-sitemaps.js
                node tools/build-educational-visuals.js --write
                stage_intended
                git diff --cached --quiet || git commit --amend --no-edit
              fi
              if git push origin main; then
                echo "[educational] pushed on attempt ${attempt}"; break
              fi
              echo "[educational] push rejected (race) on attempt ${attempt} — retrying"
            else
              echo "[educational] rebase conflict on attempt ${attempt} — regenerating shared artifacts"
              node tools/build-educational-topics.js --write
              node tools/build-educational-visuals.js --write
              node tools/generate-articles-index.js --write
              node tools/generate-seo-sitemaps.js
              stage_intended
              if [ -n "$(git diff --name-only --diff-filter=U)" ]; then
                echo "[educational] unresolved paths remain after deterministic regeneration"
                git diff --name-only --diff-filter=U
                git rebase --abort
                exit 1
              fi
              if git diff --cached --quiet; then
                git rebase --skip
              else
                git -c core.editor=true rebase --continue
              fi
            fi
            sleep $((attempt * 3))
            if [ "$attempt" = "5" ]; then echo "[educational] push failed after retries"; exit 1; fi
          done

      # Controlled Telegram delivery — AFTER push (live URL), ONLY on an actual
      # publish, DRY-RUN by default (real send needs ENABLE_TELEGRAM_PUBLISH=true
      # + secrets; sender enforces URL-200, dup, cap, cooldown). Telegram only.
      - name: Telegram delivery (controlled, dry-run unless activated)
        if: steps.publish.outputs.slug != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          ENABLE_TELEGRAM_PUBLISH: ${{ vars.ENABLE_TELEGRAM_PUBLISH }}
        run: |
          FLAG="--dry-run"
          if [ "$ENABLE_TELEGRAM_PUBLISH" = "true" ]; then FLAG="--send"; fi
          echo "[educational] controlled Telegram dispatch for article '${{ steps.publish.outputs.slug }}' (mode: $FLAG)"
          [ "$FLAG" = "--send" ] && sleep 45 || true
          node tools/send-published-article-telegram.js --slug="${{ steps.publish.outputs.slug }}" --content-type=educational $FLAG

      - name: Refresh homepage feed through its owning workflow
        if: steps.publish.outputs.slug != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run homepage-feed.yml --ref main
