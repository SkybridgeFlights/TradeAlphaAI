          npm run check:account-pages
          # Phase 220 — Auth foundation + identity validators.
          npm run check:auth-foundation
          npm run check:account-identity
          npm run check:auth-pages
          npm run check:personal-state
          npm run check:monitoring
          npm run check:watchlist-research
          npm run check:workspace-discovery
          npm run check:visual-composition
          npm run check:tactical-context
          npm run check:chart-intelligence
          npm run check:liquidity-regime
          npm run check:intelligence-monitor
          npm run check:seo
          npm run check:bilingual-structure
          npm run check:ar-rtl
          npm run check:language-purity
          npm run check:no-orphan-public-files
          npm run check:header-runtime-integrity

      - name: Commit refreshed surface (only when changed)
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: |
          git config user.name "tradealphaai-technical-intelligence-brain"
          git config user.email "actions@users.noreply.github.com"

          # Stage every path this brain may regenerate. generate-seo-sitemaps
          # rewrites ALL sitemaps + robots.txt, and the whole data/ tree holds the
          # regenerated structure/regime/chart/coverage/social artifacts. Stage
          # comprehensively + fail safe (mirrors the other publishing brains).
          INTENDED="market-structure/ ar/market-structure/ market-terminal/ ar/market-terminal/ market-regime/ ar/market-regime/ market-map/ ar/market-map/ research/ ar/research/ changes/ ar/changes/ explorer/ ar/explorer/ workspace/ ar/workspace/ account/ ar/account/ rankings/ ar/rankings/ etfs/ ar/etfs/ markets/ ar/markets/ sectors/ ar/sectors/ equities/ ar/equities/ data/ \
            sitemap.xml sitemap-core.xml sitemap-ar.xml sitemap-stocks.xml sitemap-etfs.xml \
            sitemap-compare.xml sitemap-insights.xml sitemap-market.xml robots.txt"

          stage_intended() {
            for p in $INTENDED; do
              [ -e "$p" ] && git add -A -- "$p" || true
            done
          }
          stage_intended

          # Refuse to push if anything changed OUTSIDE the intended set.
          UNRELATED=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            f="${line:3}"
            case "$f" in
              market-structure/*|ar/market-structure/*|market-terminal/*|ar/market-terminal/*|market-regime/*|ar/market-regime/*|market-map/*|ar/market-map/*|research/*|ar/research/*|changes/*|ar/changes/*|explorer/*|ar/explorer/*|workspace/*|ar/workspace/*|account/*|ar/account/*|rankings/*|ar/rankings/*|etfs/*|ar/etfs/*|markets/*|ar/markets/*|sectors/*|ar/sectors/*|equities/*|ar/equities/*|data/*|sitemap*.xml|robots.txt) ;;
              *) UNRELATED="${UNRELATED}${f}\n" ;;
            esac
          done <<< "$(git status --porcelain --untracked-files=all)"
          if [ -n "$UNRELATED" ]; then
            echo "[tech-intel] ERROR: changes outside intended paths — refusing to push partial state:"
            printf '%b' "$UNRELATED" | sed 's/^/  - /'
            exit 1
          fi

          echo "[tech-intel] === git status --short ==="; git status --short
          echo "[tech-intel] === staged diff summary ==="; git diff --cached --stat

          if git diff --cached --quiet; then
            echo "[tech-intel] no changes — nothing to commit"
            exit 0
          fi
          git commit -m "Technical intelligence brain: $(date -u +'%Y-%m-%d %H:%M') UTC"

          # Robust push: rebase onto remote; on artifact drift regenerate shared
          # deterministic artifacts, restage, continue. Rebase safety preserved.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            if git rebase origin/main; then
              if ! git diff --quiet || ! git diff --cached --quiet; then
                echo "[tech-intel] residual changes after rebase — restaging"; stage_intended
                git diff --cached --quiet || git commit --amend --no-edit
              fi
              if git push origin main; then
                echo "[tech-intel] pushed on attempt ${attempt}"; exit 0
              fi
              echo "[tech-intel] push rejected (race) on attempt ${attempt} — retrying"
            else
              echo "[tech-intel] rebase conflict on attempt ${attempt} — regenerating shared artifacts to reconcile"
              node tools/build-market-structure.js --write || echo "[tech-intel] structure regen degraded"
              node tools/build-tactical-context.js --write || echo "[tech-intel] tactical context regen degraded"
              node tools/build-institutional-charts.js --fetch --write || node tools/build-institutional-charts.js --write || echo "[tech-intel] institutional chart regen degraded"
              node tools/build-rankings.js --write || echo "[tech-intel] ranking regen degraded"
              node tools/build-relative-strength.js --write || echo "[tech-intel] relative strength regen degraded"
              node tools/build-ranking-history.js --write || echo "[tech-intel] ranking history regen degraded"
              node tools/build-market-regime-dashboard.js --write || echo "[tech-intel] market regime dashboard regen degraded"
              node tools/build-confirmation-matrix.js --write || echo "[tech-intel] confirmation matrix regen degraded"
              node tools/build-leadership-dashboard.js --write || echo "[tech-intel] leadership dashboard regen degraded"
              node tools/build-regime-history.js --write || echo "[tech-intel] regime history regen degraded"
              node tools/generate-market-regime-pages.js --write || echo "[tech-intel] market regime page regen degraded"
              node tools/build-visual-market-maps.js --write || echo "[tech-intel] visual market maps regen degraded"
              node tools/generate-market-map-pages.js --write || echo "[tech-intel] market map pages regen degraded"
              node tools/build-research-hub.js --write || echo "[tech-intel] research hub regen degraded"
              node tools/generate-research-pages.js --write || echo "[tech-intel] research pages regen degraded"
              node tools/build-entity-research.js --write || echo "[tech-intel] entity research regen degraded"
              node tools/build-change-intelligence.js --write || echo "[tech-intel] change intelligence regen degraded"
              node tools/build-etf-charts.js --fetch --write || node tools/build-etf-charts.js --write || echo "[tech-intel] ETF chart regen degraded"
              node tools/build-etf-provider-audit.js --write || echo "[tech-intel] ETF provider audit regen degraded"
              node tools/build-etf-intelligence.js --write || echo "[tech-intel] ETF intelligence regen degraded"
              node tools/build-etf-rankings.js --write || echo "[tech-intel] ETF rankings regen degraded"
              node tools/build-etf-history.js --write || echo "[tech-intel] ETF history regen degraded"
              node tools/build-etf-data-quality.js --write || echo "[tech-intel] ETF data quality regen degraded"
              node tools/build-etf-map.js --write || echo "[tech-intel] ETF map regen degraded"
              node tools/generate-etf-research-pages.js --write || echo "[tech-intel] ETF research pages regen degraded"
              node tools/generate-etf-map-pages.js --write || echo "[tech-intel] ETF map pages regen degraded"
              node tools/generate-etf-discovery-pages.js --write || echo "[tech-intel] ETF discovery pages regen degraded"
              node tools/generate-etf-coverage-pages.js --write || echo "[tech-intel] ETF coverage dashboard regen degraded"
              node tools/build-change-events.js --write || echo "[tech-intel] change events regen degraded"
              node tools/build-change-timeline.js --write || echo "[tech-intel] change timeline regen degraded"
              node tools/generate-changes-pages.js --write || echo "[tech-intel] changes pages regen degraded"
              node tools/build-intelligence-explorer.js --write || echo "[tech-intel] intelligence explorer regen degraded"
              node tools/generate-explorer-pages.js --write || echo "[tech-intel] explorer pages regen degraded"
              node tools/build-workspace.js --write || echo "[tech-intel] workspace regen degraded"
              node tools/build-watchlist-monitoring.js --write || echo "[tech-intel] watchlist monitoring regen degraded"
              node tools/generate-workspace-pages.js --write || echo "[tech-intel] workspace pages regen degraded"
              node tools/build-auth-foundation.js --write || echo "[tech-intel] auth foundation regen degraded"
              node tools/build-account-foundation.js --write || echo "[tech-intel] account foundation regen degraded"
              node tools/generate-account-pages.js --write || echo "[tech-intel] account pages regen degraded"
              node tools/generate-auth-pages.js --write || echo "[tech-intel] auth pages regen degraded"
              node tools/generate-entity-research-pages.js --write || echo "[tech-intel] entity research pages regen degraded"
