              npm run check:etf-provider-audit
              npm run check:etf-data-quality
              npm run check:etf-coverage
              npm run check:etf-activation
              npm run check:etf-provider-integrity
              npm run check:change-events
              npm run check:change-classifications
              npm run check:changes-hub
              npm run check:changes-history
              npm run check:changes-discovery
              npm run check:explorer
              npm run check:event-explorer
              npm run check:entity-explorer
              npm run check:network-explorer
              npm run check:research-explorer
              npm run check:explorer-search
              npm run check:event-graph
              npm run check:intelligence-paths
              npm run check:workspace
              npm run check:watchlists
              npm run check:account-foundation
              npm run check:watchlist-contracts
              npm run check:preferences
              npm run check:alert-contracts
              npm run check:workspace-state
              npm run check:personalization
              npm run check:account-pages
              npm run check:auth-foundation
              npm run check:account-identity
              npm run check:auth-pages
          npm run check:personal-state
              npm run check:monitoring
              npm run check:watchlist-research
              npm run check:workspace-discovery
              stage_intended
              git -c core.editor=true rebase --continue || git rebase --abort
            fi
            sleep $((attempt * 3))
          done
          echo "[tech-intel] push failed after retries"; exit 1

      # Controlled Telegram delivery — runs AFTER push so the live URL exists,
      # ONLY when a note was actually published this run, and DRY-RUN by default.
      # It posts for real only when the repo variable ENABLE_TELEGRAM_PUBLISH is
      # exactly 'true' AND the Telegram secrets are present; the sender itself
      # additionally enforces URL-200, duplicate, per-day cap and cooldown gates.
      # No X/Facebook/Instagram/LinkedIn activation here — Telegram only.
      - name: Telegram delivery (controlled, dry-run unless activated)
        if: steps.publish.outputs.slug != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          ENABLE_TELEGRAM_PUBLISH: ${{ vars.ENABLE_TELEGRAM_PUBLISH }}
        run: |
          FLAG="--dry-run"
          if [ "$ENABLE_TELEGRAM_PUBLISH" = "true" ]; then FLAG="--send"; fi
          echo "[tech-intel] controlled Telegram dispatch for structure note '${{ steps.publish.outputs.slug }}' (mode: $FLAG)"
          # Allow time for the deployment of the just-pushed page before the URL-200 gate.
          [ "$FLAG" = "--send" ] && sleep 45 || true
          node tools/send-published-article-telegram.js --slug="${{ steps.publish.outputs.slug }}" --content-type=market-structure $FLAG || echo "[tech-intel] Telegram dispatch non-fatal — continuing"
