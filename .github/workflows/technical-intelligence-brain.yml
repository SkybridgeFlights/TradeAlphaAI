              node tools/generate-structure-index.js --write || echo "[tech-intel] structure index regen degraded"
              node tools/generate-seo-sitemaps.js || echo "[tech-intel] sitemap regen degraded"
              node tools/build-social-intelligence.js --write || echo "[tech-intel] social regen degraded"
              node tools/build-distribution-plan.js --write || echo "[tech-intel] distribution regen degraded"
              npm run check:institutional-charts
              npm run check:embedded-charts
              npm run check:regime-dashboard
              npm run check:confirmation-matrix
              npm run check:leadership-dashboard
              npm run check:regime-history
              npm run check:market-regime
              npm run check:etf-registry
