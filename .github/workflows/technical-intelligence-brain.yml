          npm run check:entity-research-graph
          npm run check:change-intelligence
          npm run check:entity-changelog
          npm run check:entity-research-pages
          npm run check:research-history
          npm run check:etf-registry
          npm run check:etf-charts
          npm run check:etf-intelligence
          npm run check:etf-rankings
          npm run check:etf-history
          npm run check:etf-research
          npm run check:etf-map
          npm run check:etf-discovery
          # Phase 215 — ETF provider coverage activation validators.
          npm run check:etf-provider-audit
          npm run check:etf-data-quality
          npm run check:etf-coverage
          npm run check:etf-activation
          npm run check:etf-provider-integrity
          # Phase 216 — Change Intelligence Alerts & Monitoring validators.
          npm run check:change-events
          npm run check:change-classifications
          npm run check:changes-hub
          npm run check:changes-history
          npm run check:changes-discovery
