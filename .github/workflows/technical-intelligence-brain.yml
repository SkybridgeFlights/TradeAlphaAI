name: Technical Intelligence Brain

# Phase 116 — continuous Institutional Technical Structure Brain.
# Purpose: keep the institutional market-STRUCTURE desk publishing every session
# day — participation, volatility structure, cross-asset coherence, rotation,
# concentration, persistence and stability — even on a quiet macro tape. It
# refreshes the structural intelligence artifacts, runs the deterministic
# structure engine, then publishes ONE bilingual structure note from the current
# read with topic rotation + per-topic cooldown (no spam, no duplicate
# narratives) and honest degradation (skips green when the structural read is
# unavailable). This is institutional structure interpretation, NOT retail
# technical analysis, signals, price targets or trading advice. Reuses the gated
# market-news wrapper, intelligence rail, inline SVG panels and editorial-quality
# floor on the dedicated /market-structure/ surface.
#
# Social posting preview-only by default (ENABLE_*_POSTING flags default false);
# Telegram stays URL-200 gated in the publisher.

on:
  workflow_dispatch:
  schedule:
    # Once per session day, after the US open settles (independent of events),
    # staggered after the Daily Research Brain to avoid commit races.
    - cron: '15 15 * * 1-5'

permissions:
  contents: write

concurrency:
  group: technical-intelligence-brain
  cancel-in-progress: false

env:
  ENABLE_X_POSTING: 'false'
  ENABLE_FACEBOOK_POSTING: 'false'
  ENABLE_INSTAGRAM_POSTING: 'false'
  ENABLE_LINKEDIN_POSTING: 'false'

jobs:
  technical-intelligence-brain:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh structural intelligence + publish structure note
        id: publish
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: |
          node tools/build-liquidity-regime.js --write || echo "[tech-intel] liquidity regime degraded — continuing"
          node tools/build-market-structure.js --write || echo "[tech-intel] structure engine degraded — continuing"
          node tools/build-tactical-context.js --write || echo "[tech-intel] tactical context degraded — continuing"
          # Institutional OHLCV charts: attempt approved-provider fetch, else write
          # an HONEST empty manifest (no fabricated bars). Never fails the run.
          node tools/build-institutional-charts.js --fetch --write || node tools/build-institutional-charts.js --write || echo "[tech-intel] institutional charts unavailable — continuing"
          node tools/build-chart-intelligence.js --write || echo "[tech-intel] chart intelligence degraded — continuing"
          # Phase 201 — cognitive network + per-asset intelligence (depend on the
          # freshly built charts/structure/tactical/cross-asset artifacts), then
          # the per-asset pages, in the required order.
          node tools/build-cognitive-network.js --write || echo "[tech-intel] cognitive network degraded — continuing"
          node tools/build-asset-layers.js --write || echo "[tech-intel] asset layers degraded — continuing"
          node tools/build-asset-intelligence.js --write || echo "[tech-intel] asset intelligence degraded — continuing"
          node tools/generate-asset-pages.js --write || echo "[tech-intel] asset pages degraded — continuing"
          node tools/generate-structure-index.js --write || echo "[tech-intel] structure index degraded — continuing"
          # Capture the published slug (empty when the note self-gates) so the
          # controlled Telegram step only fires on an ACTUAL publish — never on
          # an artifact-only refresh.
          PUB=$(node tools/generate-structure-note.js --write 2>&1); echo "$PUB"
          SLUG=$(echo "$PUB" | grep -oE 'published /market-structure/[^ ]+\.html' | head -1 | sed -E 's#.*/##; s#\.html$##') || true
          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"
          node tools/generate-structure-index.js --write || echo "[tech-intel] structure index regen degraded — continuing"
          # Phase 200 — refresh the institutional market terminal from the freshly
          # rebuilt regime/tactical/structure/cross-asset/chart artifacts.
          node tools/generate-market-terminal.js --write || echo "[tech-intel] market terminal degraded — continuing"
          node tools/generate-seo-sitemaps.js || echo "[tech-intel] sitemap regen degraded — continuing"

      - name: Refresh social distribution (preview-only)
        run: |
          node tools/build-social-intelligence.js --write || echo "[tech-intel] social previews degraded — continuing"
          node tools/build-distribution-plan.js --write || echo "[tech-intel] distribution plan degraded — continuing"
          node tools/build-intelligence-monitor.js --write || echo "[tech-intel] intelligence monitor degraded — continuing"

      - name: Validate
        run: |
          npm run check:market-structure
          npm run check:structure-articles
          npm run check:telegram-activation
          npm run check:inline-visuals
          npm run check:embedded-intelligence
          npm run check:institutional-charts
          npm run check:provider-reliability
          npm run check:embedded-charts
          npm run check:cognitive-network
          npm run check:network-expansion
          npm run check:asset-structure
          npm run check:asset-tactical
          npm run check:asset-liquidity
          npm run check:asset-intelligence
          npm run check:asset-pages
          npm run check:market-terminal
          npm run check:visual-composition
          npm run check:tactical-context
          npm run check:chart-intelligence
          npm run check:liquidity-regime
          npm run check:intelligence-monitor
          npm run check:seo
          npm run check:bilingual-structure
          npm run check:ar-rtl
          npm run check:language-purity
          npm run check:no-orphan-public-files
          npm run check:header-runtime-integrity

      - name: Commit refreshed surface (only when changed)
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: |
          git config user.name "tradealphaai-technical-intelligence-brain"
          git config user.email "actions@users.noreply.github.com"

          # Stage every path this brain may regenerate. generate-seo-sitemaps
          # rewrites ALL sitemaps + robots.txt, and the whole data/ tree holds the
          # regenerated structure/regime/chart/coverage/social artifacts. Stage
          # comprehensively + fail safe (mirrors the other publishing brains).
          INTENDED="market-structure/ ar/market-structure/ market-terminal/ ar/market-terminal/ markets/ ar/markets/ data/ \
            sitemap.xml sitemap-core.xml sitemap-ar.xml sitemap-stocks.xml sitemap-etfs.xml \
            sitemap-compare.xml sitemap-insights.xml sitemap-market.xml robots.txt"

          stage_intended() {
            for p in $INTENDED; do
              [ -e "$p" ] && git add -A -- "$p" || true
            done
          }
          stage_intended

          # Refuse to push if anything changed OUTSIDE the intended set.
          UNRELATED=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            f="${line:3}"
            case "$f" in
              market-structure/*|ar/market-structure/*|market-terminal/*|ar/market-terminal/*|markets/*|ar/markets/*|data/*|sitemap*.xml|robots.txt) ;;
              *) UNRELATED="${UNRELATED}${f}\n" ;;
            esac
          done <<< "$(git status --porcelain --untracked-files=all)"
          if [ -n "$UNRELATED" ]; then
            echo "[tech-intel] ERROR: changes outside intended paths — refusing to push partial state:"
            printf '%b' "$UNRELATED" | sed 's/^/  - /'
            exit 1
          fi

          echo "[tech-intel] === git status --short ==="; git status --short
          echo "[tech-intel] === staged diff summary ==="; git diff --cached --stat

          if git diff --cached --quiet; then
            echo "[tech-intel] no changes — nothing to commit"
            exit 0
          fi
          git commit -m "Technical intelligence brain: $(date -u +'%Y-%m-%d %H:%M') UTC"

          # Robust push: rebase onto remote; on artifact drift regenerate shared
          # deterministic artifacts, restage, continue. Rebase safety preserved.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            if git rebase origin/main; then
              if ! git diff --quiet || ! git diff --cached --quiet; then
                echo "[tech-intel] residual changes after rebase — restaging"; stage_intended
                git diff --cached --quiet || git commit --amend --no-edit
              fi
              if git push origin main; then
                echo "[tech-intel] pushed on attempt ${attempt}"; exit 0
              fi
              echo "[tech-intel] push rejected (race) on attempt ${attempt} — retrying"
            else
              echo "[tech-intel] rebase conflict on attempt ${attempt} — regenerating shared artifacts to reconcile"
              node tools/build-market-structure.js --write || echo "[tech-intel] structure regen degraded"
              node tools/build-tactical-context.js --write || echo "[tech-intel] tactical context regen degraded"
              node tools/build-institutional-charts.js --fetch --write || node tools/build-institutional-charts.js --write || echo "[tech-intel] institutional chart regen degraded"
              node tools/generate-structure-index.js --write || echo "[tech-intel] structure index regen degraded"
              node tools/generate-seo-sitemaps.js || echo "[tech-intel] sitemap regen degraded"
              node tools/build-social-intelligence.js --write || echo "[tech-intel] social regen degraded"
              node tools/build-distribution-plan.js --write || echo "[tech-intel] distribution regen degraded"
              npm run check:institutional-charts
              npm run check:embedded-charts
              stage_intended
              git -c core.editor=true rebase --continue || git rebase --abort
            fi
            sleep $((attempt * 3))
          done
          echo "[tech-intel] push failed after retries"; exit 1

      # Controlled Telegram delivery — runs AFTER push so the live URL exists,
      # ONLY when a note was actually published this run, and DRY-RUN by default.
      # It posts for real only when the repo variable ENABLE_TELEGRAM_PUBLISH is
      # exactly 'true' AND the Telegram secrets are present; the sender itself
      # additionally enforces URL-200, duplicate, per-day cap and cooldown gates.
      # No X/Facebook/Instagram/LinkedIn activation here — Telegram only.
      - name: Telegram delivery (controlled, dry-run unless activated)
        if: steps.publish.outputs.slug != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          ENABLE_TELEGRAM_PUBLISH: ${{ vars.ENABLE_TELEGRAM_PUBLISH }}
        run: |
          FLAG="--dry-run"
          if [ "$ENABLE_TELEGRAM_PUBLISH" = "true" ]; then FLAG="--send"; fi
          echo "[tech-intel] controlled Telegram dispatch for structure note '${{ steps.publish.outputs.slug }}' (mode: $FLAG)"
          # Allow time for the deployment of the just-pushed page before the URL-200 gate.
          [ "$FLAG" = "--send" ] && sleep 45 || true
          node tools/send-published-article-telegram.js --slug="${{ steps.publish.outputs.slug }}" --content-type=market-structure $FLAG || echo "[tech-intel] Telegram dispatch non-fatal — continuing"
