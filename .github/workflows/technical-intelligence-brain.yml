name: Technical Intelligence Brain

# Phase 116 — continuous Institutional Technical Structure Brain.
# Purpose: keep the institutional market-STRUCTURE desk publishing every session
# day — participation, volatility structure, cross-asset coherence, rotation,
# concentration, persistence and stability — even on a quiet macro tape. It
# refreshes the structural intelligence artifacts, runs the deterministic
# structure engine, then publishes ONE bilingual structure note from the current
# read with topic rotation + per-topic cooldown (no spam, no duplicate
# narratives) and honest degradation (skips green when the structural read is
# unavailable). This is institutional structure interpretation, NOT retail
# technical analysis, signals, price targets or trading advice. Reuses the gated
# market-news wrapper, intelligence rail, inline SVG panels and editorial-quality
# floor on the dedicated /market-structure/ surface.
#
# Social posting preview-only by default (ENABLE_*_POSTING flags default false);
# Telegram stays URL-200 gated in the publisher.

on:
  workflow_dispatch:
  schedule:
    # Once per session day, after the US open settles (independent of events),
    # staggered after the Daily Research Brain to avoid commit races.
    - cron: '15 15 * * 1-5'

permissions:
  contents: write

concurrency:
  group: technical-intelligence-brain
  cancel-in-progress: false

env:
  ENABLE_X_POSTING: 'false'
  ENABLE_FACEBOOK_POSTING: 'false'
  ENABLE_INSTAGRAM_POSTING: 'false'
  ENABLE_LINKEDIN_POSTING: 'false'

jobs:
  technical-intelligence-brain:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh structural intelligence + publish structure note
        id: publish
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: |
          node tools/build-liquidity-regime.js --write || echo "[tech-intel] liquidity regime degraded — continuing"
          node tools/build-market-structure.js --write || echo "[tech-intel] structure engine degraded — continuing"
          node tools/build-tactical-context.js --write || echo "[tech-intel] tactical context degraded — continuing"
          # Institutional OHLCV charts: attempt approved-provider fetch, else write
          # an HONEST empty manifest (no fabricated bars). Never fails the run.
          node tools/build-institutional-charts.js --fetch --write || node tools/build-institutional-charts.js --write || echo "[tech-intel] institutional charts unavailable — continuing"
          node tools/build-chart-intelligence.js --write || echo "[tech-intel] chart intelligence degraded — continuing"
          # Phase 201 — cognitive network + per-asset intelligence (depend on the
          # freshly built charts/structure/tactical/cross-asset artifacts), then
          # the per-asset pages, in the required order.
          node tools/build-asset-layers.js --write || echo "[tech-intel] asset layers degraded — continuing"
          # Phase 204 — macro layers (dollar/yield/volatility/macro-regime) depend
          # on the per-asset layers; cognitive network reads the charts + macro.
          node tools/build-macro-layers.js --write || echo "[tech-intel] macro layers degraded — continuing"
          node tools/build-cognitive-network.js --write || echo "[tech-intel] cognitive network degraded — continuing"
          # Phase 205 — sector intelligence network (real sector OHLCV via the
          # keyless Yahoo tier, else honest unavailable; never placeholders).
          node tools/build-sector-charts.js --fetch --write || node tools/build-sector-charts.js --write || echo "[tech-intel] sector charts unavailable — continuing"
          node tools/build-sector-layers.js --write || echo "[tech-intel] sector layers degraded — continuing"
          node tools/build-sector-rotation.js --write || echo "[tech-intel] sector rotation degraded — continuing"
          node tools/build-sector-cognitive-network.js --write || echo "[tech-intel] sector cognitive network degraded — continuing"
          # Phase 206 — equity intelligence (real equity OHLCV via the keyless
          # Yahoo tier, else honest unavailable; never placeholders).
          node tools/build-equity-charts.js --fetch --write || node tools/build-equity-charts.js --write || echo "[tech-intel] equity charts unavailable — continuing"
          node tools/build-equity-layers.js --write || echo "[tech-intel] equity layers degraded — continuing"
          node tools/build-equity-intelligence.js --write || echo "[tech-intel] equity intelligence degraded — continuing"
          node tools/build-equity-cognitive-network.js --write || echo "[tech-intel] equity cognitive network degraded — continuing"
          node tools/build-asset-intelligence.js --write || echo "[tech-intel] asset intelligence degraded — continuing"
          node tools/build-data-coverage.js --write || echo "[tech-intel] data coverage degraded — continuing"
          # Phase 207 — historical intelligence (all charts now built): snapshot
          # ledger, per-entity history engines, regime transitions, momentum scores.
          node tools/build-historical-snapshots.js --write || echo "[tech-intel] historical snapshots degraded — continuing"
          node tools/build-history-engines.js --write || echo "[tech-intel] history engines degraded — continuing"
          node tools/build-regime-transitions.js --write || echo "[tech-intel] regime transitions degraded — continuing"
          node tools/build-historical-intelligence.js --write || echo "[tech-intel] historical intelligence degraded — continuing"
          # Phase 208 — institutional narrative engine (composes the full stack);
          # must precede page generation so pages embed the narrative.
          node tools/build-market-narrative-engine.js --write || echo "[tech-intel] market narrative degraded — continuing"
          node tools/build-rankings.js --write || echo "[tech-intel] rankings degraded — continuing"
          node tools/build-relative-strength.js --write || echo "[tech-intel] relative strength degraded — continuing"
          node tools/build-ranking-history.js --write || echo "[tech-intel] ranking history degraded — continuing"
          # Phase 210 — Market Regime Command Center composes the full macro,
          # asset, sector, equity, ranking and historical stack before pages.
          node tools/build-market-regime-dashboard.js --write || echo "[tech-intel] market regime dashboard degraded — continuing"
          node tools/build-confirmation-matrix.js --write || echo "[tech-intel] confirmation matrix degraded — continuing"
          node tools/build-leadership-dashboard.js --write || echo "[tech-intel] leadership dashboard degraded — continuing"
          node tools/build-regime-history.js --write || echo "[tech-intel] regime history degraded — continuing"
          node tools/generate-market-regime-pages.js --write || echo "[tech-intel] market regime pages degraded — continuing"
          # Phase 211 — visual market maps: derive map artifacts from the freshly
          # rebuilt rankings + regime, then render the 12 map pages (EN/AR). Must
          # precede sitemap regen so the maps are indexed.
          node tools/build-visual-market-maps.js --write || echo "[tech-intel] visual market maps degraded — continuing"
          node tools/generate-market-map-pages.js --write || echo "[tech-intel] market map pages degraded — continuing"
          # Phase 212 — research network: aggregate the existing intelligence into
          # research-hub/graph/briefs/authority, then render the research pages.
          # MUST precede entity pages (they embed Related Research from the graph).
          node tools/build-research-hub.js --write || echo "[tech-intel] research hub degraded — continuing"
          node tools/generate-research-pages.js --write || echo "[tech-intel] research pages degraded — continuing"
          # Phase 213 — entity research + change intelligence: per-entity research,
          # the entity research graph, and change/changelog memory. MUST precede
          # entity pages (Related Research reads the entity graph) and the entity
          # research pages.
          node tools/build-entity-research.js --write || echo "[tech-intel] entity research degraded — continuing"
          node tools/build-change-intelligence.js --write || echo "[tech-intel] change intelligence degraded — continuing"
          # Phase 214 + Phase 215 — ETF Intelligence Universe + Provider Coverage
          # Activation: direct ETF registry, approved provider chart coverage,
          # provider audit, data quality, ETF intelligence/rankings/history,
          # research, map, discovery and coverage dashboard. No proxy
          # substitution or fabricated charts.
          node tools/build-etf-charts.js --fetch --write || node tools/build-etf-charts.js --write || echo "[tech-intel] ETF charts unavailable — continuing"
          node tools/build-etf-provider-audit.js --write || echo "[tech-intel] ETF provider audit degraded — continuing"
          node tools/build-etf-intelligence.js --write || echo "[tech-intel] ETF intelligence degraded — continuing"
          node tools/build-etf-rankings.js --write || echo "[tech-intel] ETF rankings degraded — continuing"
          node tools/build-etf-history.js --write || echo "[tech-intel] ETF history degraded — continuing"
          node tools/build-etf-data-quality.js --write || echo "[tech-intel] ETF data quality degraded — continuing"
          node tools/build-etf-map.js --write || echo "[tech-intel] ETF map degraded — continuing"
          node tools/generate-etf-research-pages.js --write || echo "[tech-intel] ETF research pages degraded — continuing"
          node tools/generate-etf-map-pages.js --write || echo "[tech-intel] ETF map pages degraded — continuing"
          node tools/generate-etf-discovery-pages.js --write || echo "[tech-intel] ETF discovery pages degraded — continuing"
          node tools/generate-etf-coverage-pages.js --write || echo "[tech-intel] ETF coverage dashboard degraded — continuing"
          # Phase 216 — Change Intelligence Alerts & Monitoring. Build the
          # change-events + classifications + timeline BEFORE entity research
          # pages and entity detail pages so the Recent Changes section on
          # those pages reads the freshest events.
          node tools/build-change-events.js --write || echo "[tech-intel] change events degraded — continuing"
          node tools/build-change-timeline.js --write || echo "[tech-intel] change timeline degraded — continuing"
          node tools/generate-changes-pages.js --write || echo "[tech-intel] changes pages degraded — continuing"
          node tools/build-intelligence-explorer.js --write || echo "[tech-intel] intelligence explorer degraded — continuing"
          node tools/generate-explorer-pages.js --write || echo "[tech-intel] explorer pages degraded — continuing"
          # Phase 218 — Intelligence Workspace: compose watchlists and monitoring
          # from existing rankings, changes, research and regime artifacts.
          node tools/build-workspace.js --write || echo "[tech-intel] workspace degraded — continuing"
          node tools/build-watchlist-monitoring.js --write || echo "[tech-intel] watchlist monitoring degraded — continuing"
          node tools/generate-workspace-pages.js --write || echo "[tech-intel] workspace pages degraded — continuing"
          # Phase 219 — Account-ready foundation (contracts only — no auth,
          # no billing, no recommendation engine, no live alert dispatch).
          # Phase 220 — Auth foundation + Account identity (contract phase
          # only: no SDK, no keys, hosted-UI flow declared but not active).
          node tools/build-auth-foundation.js --write || echo "[tech-intel] auth foundation degraded — continuing"
          node tools/build-personal-state.js --write || echo "[tech-intel] personal state degraded — continuing"
          node tools/build-account-foundation.js --write || echo "[tech-intel] account foundation degraded — continuing"
          node tools/generate-account-pages.js --write || echo "[tech-intel] account pages degraded — continuing"
          node tools/generate-auth-pages.js --write || echo "[tech-intel] auth pages degraded — continuing"
          node tools/generate-entity-research-pages.js --write || echo "[tech-intel] entity research pages degraded — continuing"
          # Pages last, so every page embeds the freshest current + historical state.
          node tools/generate-sector-pages.js --write || echo "[tech-intel] sector pages degraded — continuing"
          node tools/generate-equity-pages.js --write || echo "[tech-intel] equity pages degraded — continuing"
          node tools/generate-asset-pages.js --write || echo "[tech-intel] asset pages degraded — continuing"
          node tools/generate-ranking-pages.js --write || echo "[tech-intel] ranking pages degraded — continuing"
          node tools/generate-intelligence-indexes.js --write || echo "[tech-intel] intelligence indexes degraded — continuing"
          node tools/generate-structure-index.js --write || echo "[tech-intel] structure index degraded — continuing"
          # Capture the published slug (empty when the note self-gates) so the
          # controlled Telegram step only fires on an ACTUAL publish — never on
          # an artifact-only refresh.
          PUB=$(node tools/generate-structure-note.js --write 2>&1); echo "$PUB"
          SLUG=$(echo "$PUB" | grep -oE 'published /market-structure/[^ ]+\.html' | head -1 | sed -E 's#.*/##; s#\.html$##') || true
          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"
          node tools/generate-structure-index.js --write || echo "[tech-intel] structure index regen degraded — continuing"
          # Phase 200 — refresh the institutional market terminal from the freshly
          # rebuilt regime/tactical/structure/cross-asset/chart artifacts.
          node tools/generate-market-terminal.js --write || echo "[tech-intel] market terminal degraded — continuing"
          node tools/generate-seo-sitemaps.js || echo "[tech-intel] sitemap regen degraded — continuing"

      - name: Refresh social distribution (preview-only)
        run: |
          node tools/build-social-intelligence.js --write || echo "[tech-intel] social previews degraded — continuing"
          node tools/build-distribution-plan.js --write || echo "[tech-intel] distribution plan degraded — continuing"
          node tools/build-intelligence-monitor.js --write || echo "[tech-intel] intelligence monitor degraded — continuing"

      - name: Validate
