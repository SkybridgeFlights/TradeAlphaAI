name: News Analysis Draft

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  news-analysis-draft:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Validate queue before generation
        run: npm run check:editorial

      - name: Generate sourced news-analysis draft
        run: node tools/generate-news-analysis-draft.js

      - name: Validate generated draft
        run: |
          npm run check:editorial
          npm run check:utf8

      - name: Commit draft if changed
        run: |
          if git diff --quiet; then
            echo "No news-analysis draft changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news-analysis-queue.json drafts/news-analysis
          git commit -m "Generate sourced news-analysis draft"
          git push origin HEAD:main
