name: Daily Newsletter

# Sends the TradeAlpha Daily newsletter via Substack every morning.
#
# Workflow steps:
#   1. Smoke-test the Substack session cookie (fail fast if expired)
#   2. Generate the digest (collects last 24h of publishes)
#   3. Write the public archive page at /newsletter/YYYY-MM-DD.html
#   4. Create + publish a Substack post (emails subscribers)
#   5. Commit the archive page
#   6. Telegram notify on success / failure
#
# Manual trigger inputs let you do dry-runs and shorten/lengthen the window
# (useful for catch-up posts).

on:
  schedule:
    # 08:00 UTC daily = 11:00 Riyadh / 08:00 London / 04:00 New York.
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip Substack publish (still writes archive page)'
        type: boolean
        default: false
      no_send:
        description: 'Publish to Substack web but do NOT email subscribers'
        type: boolean
        default: false
      window_hours:
        description: 'How many hours back to collect items from'
        type: string
        default: '24'

permissions:
  contents: write

concurrency:
  group: daily-newsletter
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      SUBSTACK_HOSTNAME: ${{ vars.SUBSTACK_HOSTNAME || 'tradealphaai.substack.com' }}
      SUBSTACK_SESSION_COOKIE: ${{ secrets.SUBSTACK_SESSION_COOKIE }}
      SUBSTACK_USER_ID: ${{ secrets.SUBSTACK_USER_ID }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Smoke-test Substack cookie
        if: ${{ env.SUBSTACK_SESSION_COOKIE != '' }}
        run: node tools/send-daily-newsletter.js --smoke-test

      - name: Generate + publish daily digest
        run: |
          ARGS=""
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then ARGS="$ARGS --dry-run"; fi
          if [[ "${{ github.event.inputs.no_send }}" == "true" ]]; then ARGS="$ARGS --no-send"; fi
          if [[ -n "${{ github.event.inputs.window_hours }}" ]]; then ARGS="$ARGS --window-hours=${{ github.event.inputs.window_hours }}"; fi
          echo "[run] node tools/send-daily-newsletter.js $ARGS"
          node tools/send-daily-newsletter.js $ARGS

      - name: Commit archive page
        if: ${{ github.event.inputs.dry_run != 'true' || github.event_name == 'schedule' }}
        continue-on-error: true
        run: |
          if ! git diff --quiet -- newsletter/; then
            git config user.name "tradealphaai-bot"
            git config user.email "actions@users.noreply.github.com"
            git add -- newsletter/
            git commit -m "Daily newsletter archive: $(date -u +%Y-%m-%d)"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin "${GITHUB_REF_NAME}"
          else
            echo "[archive] no changes to commit"
          fi
