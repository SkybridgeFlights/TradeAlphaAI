name: Daily Newsletter

# Semi-automated Substack flow — Cloudflare blocks direct API posting from
# GitHub Actions runner IPs, so this workflow does everything EXCEPT the final
# "Send" click:
#
#   1. Collect last N hours of publishes across editorial / news / outlooks
#   2. Write /newsletter/YYYY-MM-DD.html public archive page (SEO)
#   3. Build a Substack-ready Markdown digest
#   4. Telegram it to you as a copy-block + Substack "new post" deep link
#
# You: long-press the code block in Telegram → open Substack → paste → Send.
# ~30 seconds daily.

on:
  schedule:
    # 08:00 UTC daily = 11:00 Riyadh / 08:00 London / 04:00 New York.
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Write archive + print Markdown to logs. Skip Telegram.'
        type: boolean
        default: false
      window_hours:
        description: 'How many hours back to collect items from'
        type: string
        default: '24'

permissions:
  contents: write

concurrency:
  group: daily-newsletter
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      SUBSTACK_HOSTNAME: ${{ vars.SUBSTACK_HOSTNAME || 'tradealphaai.substack.com' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate digest + Telegram
        run: |
          ARGS=""
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then ARGS="$ARGS --dry-run"; fi
          if [[ -n "${{ github.event.inputs.window_hours }}" ]]; then ARGS="$ARGS --window-hours=${{ github.event.inputs.window_hours }}"; fi
          echo "[run] node tools/send-daily-newsletter.js $ARGS"
          node tools/send-daily-newsletter.js $ARGS

      - name: Commit archive page
        if: ${{ github.event.inputs.dry_run != 'true' || github.event_name == 'schedule' }}
        continue-on-error: true
        run: |
          if ! git diff --quiet -- newsletter/; then
            git config user.name "tradealphaai-bot"
            git config user.email "actions@users.noreply.github.com"
            git add -- newsletter/
            git commit -m "Daily newsletter archive: $(date -u +%Y-%m-%d)"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin "${GITHUB_REF_NAME}"
          else
            echo "[archive] no changes to commit"
          fi
