name: Market News Brain

# Phase 98 — canonical Market News desk (event-driven).
# Purpose: keep the /market-news/ surface, the event-significance eligibility
# engine, and its distribution current. It publishes reaction analysis only
# when a released, surprising, cross-asset-confirmed event clears the
# significance threshold — the eligibility engine gates that. Full article-page
# publishing flows through the gated Autonomous Publishing Brain engine.
#
# Social posting preview-only by default (ENABLE_*_POSTING flags default false);
# Telegram stays URL-200 gated in the publisher.

on:
  workflow_dispatch:
  schedule:
    # Several checks across the US session (event-driven; publishes only if eligible).
    - cron: '20 13,16,19 * * 1-5'

permissions:
  contents: write

concurrency:
  group: market-news-brain
  cancel-in-progress: false

env:
  ENABLE_X_POSTING: 'false'
  ENABLE_FACEBOOK_POSTING: 'false'
  ENABLE_INSTAGRAM_POSTING: 'false'
  ENABLE_LINKEDIN_POSTING: 'false'

jobs:
  market-news-brain:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh newswire + news eligibility + surface
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          node tools/build-global-macro-events.js --write || echo "[market-news] global macro acquisition degraded — continuing"
          node tools/fetch-economic-calendar.js --write || echo "[market-news] calendar fetch degraded — using cache"
          node tools/build-economic-intelligence.js --fetch --write || echo "[market-news] economic intelligence degraded — continuing"
          node tools/build-macro-reactions.js --write || echo "[market-news] macro reactions degraded — continuing"
          node tools/build-newswire-events.js --write || echo "[market-news] newswire degraded — continuing"
          node tools/build-news-eligibility.js --write || echo "[market-news] eligibility degraded — continuing"
          node tools/generate-market-news-index.js --write || echo "[market-news] surface regen degraded — continuing"
          node tools/generate-seo-sitemaps.js || echo "[market-news] sitemap regen degraded — continuing"

      - name: Refresh social distribution (preview-only)
        run: |
          node tools/build-social-intelligence.js --write || echo "[market-news] social previews degraded — continuing"
          node tools/build-distribution-plan.js --write || echo "[market-news] distribution plan degraded — continuing"

      - name: Validate
        run: |
          npm run check:market-news
          npm run check:global-macro-acquisition
          npm run check:economic-intelligence
          npm run check:forecast-consensus
          npm run check:macro-reactions
          npm run check:newsroom-intelligence
          npm run check:distribution-plan
          npm run check:seo
          npm run check:bilingual-structure

      - name: Commit refreshed surface (only when changed)
        run: |
          git config user.name "tradealphaai-market-news-brain"
          git config user.email "actions@users.noreply.github.com"

          # Stage every path this brain may regenerate. generate-seo-sitemaps
          # rewrites ALL sitemaps + robots.txt, and the whole data/ tree holds the
          # regenerated newswire/eligibility/calendar/social artifacts. Staging
          # narrowly (the prior sitemap-core/sitemap-ar only) left other sitemaps
          # unstaged → git rebase aborted with "you have unstaged changes". Stage
          # comprehensively + fail safe.
          INTENDED="market-news/ ar/market-news/ data/ \
            sitemap.xml sitemap-core.xml sitemap-ar.xml sitemap-stocks.xml sitemap-etfs.xml \
            sitemap-compare.xml sitemap-insights.xml sitemap-market.xml robots.txt"

          stage_intended() {
            for p in $INTENDED; do
              [ -e "$p" ] && git add -A -- "$p" || true
            done
          }
          stage_intended

          # Refuse to push if anything changed OUTSIDE the intended set (local
          # settings, logs, stray drafts) rather than committing a partial state.
          UNRELATED=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            f="${line:3}"
            case "$f" in
              market-news/*|ar/market-news/*|data/*|sitemap*.xml|robots.txt) ;;
              *) UNRELATED="${UNRELATED}${f}\n" ;;
            esac
          done <<< "$(git status --porcelain --untracked-files=all)"
          if [ -n "$UNRELATED" ]; then
            echo "[market-news] ERROR: changes outside intended paths — refusing to push partial state:"
            printf '%b' "$UNRELATED" | sed 's/^/  - /'
            exit 1
          fi

          echo "[market-news] === git status --short ==="; git status --short
          echo "[market-news] === staged diff summary ==="; git diff --cached --stat
          echo "[market-news] === unstaged diff summary (expected empty) ==="; git diff --stat

          if git diff --cached --quiet; then
            echo "[market-news] no changes — nothing to commit"
            exit 0
          fi
          git commit -m "Market news brain refresh: $(date -u +'%Y-%m-%d %H:%M') UTC"

          # Robust push: rebase onto remote; on artifact drift/conflict regenerate
          # the shared deterministic artifacts, restage, continue. Rebase safety kept.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            if git rebase origin/main; then
              if ! git diff --quiet || ! git diff --cached --quiet; then
                echo "[market-news] residual changes after rebase — restaging"; stage_intended
                git diff --cached --quiet || git commit --amend --no-edit
              fi
              if git push origin main; then
                echo "[market-news] pushed on attempt ${attempt}"; exit 0
              fi
              echo "[market-news] push rejected (race) on attempt ${attempt} — retrying"
            else
              echo "[market-news] rebase conflict on attempt ${attempt} — regenerating shared artifacts to reconcile"
              node tools/generate-seo-sitemaps.js || echo "[market-news] sitemap regen degraded"
              node tools/build-social-intelligence.js --write || echo "[market-news] social regen degraded"
              node tools/build-distribution-plan.js --write || echo "[market-news] distribution regen degraded"
              stage_intended
              git -c core.editor=true rebase --continue || git rebase --abort
            fi
            sleep $((attempt * 3))
          done
          echo "[market-news] push failed after retries"; exit 1
