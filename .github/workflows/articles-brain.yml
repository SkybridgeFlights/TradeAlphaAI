name: Articles Brain

# Phase 98 — canonical Educational Articles desk.
# Purpose: keep the /articles/ institutional research surface, its topic
# selection (anti-repetition), and its social distribution current on a steady
# daily cadence — independent of market tension. Full article-page publishing
# flows through the gated Autonomous Publishing Brain engine (single
# publishing-lock, quality + integrity + URL-verified Telegram), which this
# brain feeds with fresh, de-duplicated topic eligibility.
#
# Social posting is preview-only by default. Live posting requires explicit
# ENABLE_*_POSTING env flags (default false); Telegram delivery stays gated
# by the publisher's URL-200 verification.

on:
  workflow_dispatch:
  # Cron disabled — superseded by tradealpha-workflow.yml as of 2026-06-22.
  # schedule:
  #   - cron: '10 6 * * *'

permissions:
  contents: write

concurrency:
  group: articles-brain
  cancel-in-progress: false

env:
  ENABLE_X_POSTING: 'false'
  ENABLE_FACEBOOK_POSTING: 'false'
  ENABLE_INSTAGRAM_POSTING: 'false'
  ENABLE_LINKEDIN_POSTING: 'false'

jobs:
  articles-brain:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh educational topic selection + research surface
        run: |
          node tools/build-educational-topics.js --write || echo "[articles] topic engine degraded — continuing"
          node tools/generate-articles-index.js --write || echo "[articles] surface regen degraded — continuing"
          node tools/generate-seo-sitemaps.js || echo "[articles] sitemap regen degraded — continuing"

      - name: Refresh social distribution (preview-only)
        run: |
          node tools/build-social-intelligence.js --write || echo "[articles] social previews degraded — continuing"
          node tools/build-distribution-plan.js --write || echo "[articles] distribution plan degraded — continuing"
          node tools/build-intelligence-monitor.js --write || echo "[articles] intelligence monitor degraded — continuing"

      - name: Validate
        run: |
          npm run check:educational-articles
          npm run check:distribution-plan
          npm run check:intelligence-monitor
          npm run check:seo
          npm run check:indexing
          npm run check:bilingual-structure

      - name: Commit refreshed surface (only when changed)
        run: |
          git config user.name "tradealphaai-articles-brain"
          git config user.email "actions@users.noreply.github.com"

          # Stage every path this brain may regenerate. generate-seo-sitemaps
          # rewrites ALL sitemaps + robots.txt, and the whole data/ tree holds the
          # regenerated topic/social artifacts. Staging narrowly (the prior
          # sitemap-core/sitemap-ar only) left other sitemaps unstaged → git rebase
          # aborted with "you have unstaged changes". Stage comprehensively + fail safe.
          INTENDED="articles/ ar/articles/ data/ \
            sitemap.xml sitemap-core.xml sitemap-ar.xml sitemap-stocks.xml sitemap-etfs.xml \
            sitemap-compare.xml sitemap-insights.xml sitemap-market.xml robots.txt"

          stage_intended() {
            for p in $INTENDED; do
              [ -e "$p" ] && git add -A -- "$p" || true
            done
          }
          stage_intended

          # Refuse to push if anything changed OUTSIDE the intended set (local
          # settings, logs, stray drafts) rather than committing a partial state.
          UNRELATED=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            f="${line:3}"
            case "$f" in
              articles/*|ar/articles/*|data/*|sitemap*.xml|robots.txt) ;;
              *) UNRELATED="${UNRELATED}${f}\n" ;;
            esac
          done <<< "$(git status --porcelain --untracked-files=all)"
          if [ -n "$UNRELATED" ]; then
            echo "[articles] ERROR: changes outside intended paths — refusing to push partial state:"
            printf '%b' "$UNRELATED" | sed 's/^/  - /'
            exit 1
          fi

          echo "[articles] === git status --short ==="; git status --short
          echo "[articles] === staged diff summary ==="; git diff --cached --stat
          echo "[articles] === unstaged diff summary (expected empty) ==="; git diff --stat

          if git diff --cached --quiet; then
            echo "[articles] no changes — nothing to commit"
            exit 0
          fi
          git commit -m "Articles brain refresh: $(date -u +'%Y-%m-%d %H:%M') UTC"

          # Robust push: rebase onto remote; on artifact drift/conflict regenerate
          # the shared deterministic artifacts, restage, continue. Rebase safety kept.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            if git rebase origin/main; then
              if ! git diff --quiet || ! git diff --cached --quiet; then
                echo "[articles] residual changes after rebase — restaging"; stage_intended
                git diff --cached --quiet || git commit --amend --no-edit
              fi
              if git push origin main; then
                echo "[articles] pushed on attempt ${attempt}"; exit 0
              fi
              echo "[articles] push rejected (race) on attempt ${attempt} — retrying"
            else
              echo "[articles] rebase conflict on attempt ${attempt} — regenerating shared artifacts to reconcile"
              node tools/generate-seo-sitemaps.js || echo "[articles] sitemap regen degraded"
              node tools/build-social-intelligence.js --write || echo "[articles] social regen degraded"
              node tools/build-distribution-plan.js --write || echo "[articles] distribution regen degraded"
              stage_intended
              git -c core.editor=true rebase --continue || git rebase --abort
            fi
            sleep $((attempt * 3))
          done
          echo "[articles] push failed after retries"; exit 1
