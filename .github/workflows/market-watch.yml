name: Intraday Market Watch

# Phase 75-RT — intraday refresh loop. Keeps the server-rendered newsroom,
# pulse, cognition, and wire current during US market hours so the terminal
# evolves intraday instead of waiting for the daily publishing run.
#
# Scope is intentionally narrow: fetch live state -> rebuild intelligence
# artifacts -> re-render newsroom -> validate -> commit only when artifacts
# actually changed. No publishing, no Telegram, no content generation —
# all publication integrity protections stay exclusively in the
# autonomous-publishing-brain pipeline.

on:
  workflow_dispatch:
  schedule:
    # Every 30 minutes through the US session (13:00–21:00 UTC, Mon–Fri).
    - cron: '5,35 13-20 * * 1-5'

permissions:
  contents: write

concurrency:
  group: intraday-market-watch
  cancel-in-progress: false

jobs:
  market-watch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch live market state (sourced providers only)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          node tools/update-live-market-state.js --fetch --write || echo "[market-watch] live fetch degraded — existing state retained"

      - name: Rebuild intraday intelligence stack
        run: |
          node tools/build-market-narrative-state.js --write || echo "[market-watch] narrative-state degraded — continuing"
          node tools/build-newswire-events.js --write || echo "[market-watch] newswire degraded — continuing"
          node tools/build-market-pulse.js --write || echo "[market-watch] pulse degraded — continuing"
          node tools/build-market-cognition.js --write || echo "[market-watch] cognition degraded — continuing"
          node tools/build-macro-cognition.js --write || echo "[market-watch] macro-cognition degraded — continuing"
          node tools/build-narrative-convergence.js --write || echo "[market-watch] convergence degraded — continuing"
          node tools/build-chart-narratives.js --write || echo "[market-watch] chart-narratives degraded — continuing"
          node tools/build-editorial-market-memory.js --write || echo "[market-watch] editorial-memory degraded — continuing"
          node tools/build-structural-tension.js --write || echo "[market-watch] structural-tension degraded — continuing"
          node tools/build-economic-intelligence.js --fetch --write || echo "[market-watch] economic intelligence degraded — continuing"
          node tools/build-macro-reactions.js --write || echo "[market-watch] macro reactions degraded — continuing"
          node tools/build-intelligence-briefs.js --write || echo "[market-watch] daily product brief degraded — continuing"
          node tools/build-intraday-brief.js --write || echo "[market-watch] intraday brief degraded — continuing"
          node tools/build-social-intelligence.js --write || echo "[market-watch] social previews degraded — continuing (preview-only)"
          node tools/build-editorial-graphics.js --write || echo "[market-watch] editorial graphics degraded — continuing (preview-only)"
          node tools/build-graphic-exports.js --write || echo "[market-watch] graphic exports degraded — continuing (preview-only SVG)"
          node tools/build-distribution-plan.js --write || echo "[market-watch] distribution plan degraded — continuing (preview-only routing)"
          node tools/render-newsroom-modules.js || echo "[market-watch] render degraded — continuing"

      - name: Validate intraday artifacts
        run: |
          npm run check:newsroom-intelligence
          npm run check:newsroom-ui
          npm run check:market-cognition
          npm run check:macro-cognition
          npm run check:macro-reactions
          npm run check:narrative-convergence
          npm run test:editorial-memory
          npm run check:editorial-memory
          npm run test:structural-tension
          npm run check:structural-tension
          npm run check:live-terminal
          npm run check:intelligence-productization
          npm run check:social-intelligence
          npm run check:editorial-graphics
          npm run check:graphic-exports
          npm run check:distribution-plan
          npm run test:newsroom-behavior

      - name: Commit refreshed state (only when changed)
        run: |
          git config user.name "tradealphaai-market-watch"
          git config user.email "actions@users.noreply.github.com"
          git add data/ index.html ar/index.html
          if git diff --cached --quiet; then
            echo "[market-watch] no intraday changes — nothing to commit"
            exit 0
          fi
          git commit -m "Intraday market watch: $(date -u +'%Y-%m-%d %H:%M') UTC"
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "[market-watch] push attempt ${attempt} failed — retrying"
            sleep 5
          done
          echo "[market-watch] push failed after retries"; exit 1
