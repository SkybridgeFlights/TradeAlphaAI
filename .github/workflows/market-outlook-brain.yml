name: Market Outlook Brain

# Phase 98 — canonical Market Outlook desk (high-conviction, selective).
# Purpose: keep the institutional intelligence stack that gates outlook
# publishing — cognition, macro cognition, convergence, structural tension,
# chart narratives — current, plus the /market-outlook/ surface and its
# distribution. It is the most selective desk: an outlook publishes only when
# verified tension / divergence / catalyst pressure clears conviction, which
# the gated Autonomous Publishing Brain engine enforces.
#
# Social posting preview-only by default; Telegram URL-200 gated in publisher.

on:
  workflow_dispatch:
  schedule:
    # 3x/week check (Mon/Wed/Fri 09:40 UTC); publishes only if conviction passes.
    - cron: '40 9 * * 1,3,5'

permissions:
  contents: write

concurrency:
  group: market-outlook-brain
  cancel-in-progress: false

env:
  ENABLE_X_POSTING: 'false'
  ENABLE_FACEBOOK_POSTING: 'false'
  ENABLE_INSTAGRAM_POSTING: 'false'
  ENABLE_LINKEDIN_POSTING: 'false'

jobs:
  market-outlook-brain:
    runs-on: ubuntu-latest
    timeout-minutes: 14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh conviction intelligence stack
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          node tools/update-live-market-state.js --fetch --write || echo "[outlook] live state degraded — continuing"
          node tools/build-global-macro-events.js --write || echo "[outlook] global macro acquisition degraded — continuing"
          node tools/build-economic-intelligence.js --fetch --write || echo "[outlook] economic intelligence degraded — continuing"
          node tools/build-macro-reactions.js --write || echo "[outlook] macro reactions degraded — continuing"
          node tools/build-liquidity-regime.js --write || echo "[outlook] liquidity regime degraded — continuing"
          node tools/build-market-pulse.js --write || echo "[outlook] pulse degraded — continuing"
          node tools/build-market-cognition.js --write || echo "[outlook] cognition degraded — continuing"
          node tools/build-macro-cognition.js --write || echo "[outlook] macro cognition degraded — continuing"
          node tools/build-narrative-convergence.js --write || echo "[outlook] convergence degraded — continuing"
          node tools/build-structural-tension.js --write || echo "[outlook] structural tension degraded — continuing"
          node tools/build-chart-narratives.js --write || echo "[outlook] chart narratives degraded — continuing"

      - name: Refresh social distribution (preview-only)
        run: |
          node tools/build-social-intelligence.js --write || echo "[outlook] social previews degraded — continuing"
          node tools/build-editorial-graphics.js --write || echo "[outlook] graphics degraded — continuing"
          node tools/build-graphic-exports.js --write || echo "[outlook] graphic exports degraded — continuing"
          node tools/build-distribution-plan.js --write || echo "[outlook] distribution plan degraded — continuing"
          node tools/build-intelligence-monitor.js --write || echo "[outlook] intelligence monitor degraded — continuing"

      - name: Validate
        run: |
          npm run check:market-cognition
          npm run check:macro-cognition
          npm run check:narrative-convergence
          npm run check:structural-tension
          npm run check:editorial-visuals
          npm run check:global-macro-acquisition
          npm run check:economic-intelligence
          npm run check:forecast-consensus
          npm run check:macro-reactions
          npm run check:liquidity-regime
          npm run check:intelligence-monitor
          npm run check:distribution-plan

      - name: Commit refreshed intelligence (only when changed)
        run: |
          git config user.name "tradealphaai-market-outlook-brain"
          git config user.email "actions@users.noreply.github.com"

          # Stage every path this brain may regenerate: the whole data/ tree
          # (conviction intelligence + visual + social artifacts), both section
          # dirs, and sitemaps/robots in case a shared regen touches them. The
          # prior loop also lacked a fail-safe gate and conflict-reconcile, so a
          # cross-brain artifact race could leave it unable to push. Robust + fail safe.
          INTENDED="market-outlook/ ar/market-outlook/ data/ \
            sitemap.xml sitemap-core.xml sitemap-ar.xml sitemap-stocks.xml sitemap-etfs.xml \
            sitemap-compare.xml sitemap-insights.xml sitemap-market.xml robots.txt"

          stage_intended() {
            for p in $INTENDED; do
              [ -e "$p" ] && git add -A -- "$p" || true
            done
          }
          stage_intended

          # Refuse to push if anything changed OUTSIDE the intended set (local
          # settings, logs, stray drafts) rather than committing a partial state.
          UNRELATED=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            f="${line:3}"
            case "$f" in
              market-outlook/*|ar/market-outlook/*|data/*|sitemap*.xml|robots.txt) ;;
              *) UNRELATED="${UNRELATED}${f}\n" ;;
            esac
          done <<< "$(git status --porcelain --untracked-files=all)"
          if [ -n "$UNRELATED" ]; then
            echo "[outlook] ERROR: changes outside intended paths — refusing to push partial state:"
            printf '%b' "$UNRELATED" | sed 's/^/  - /'
            exit 1
          fi

          echo "[outlook] === git status --short ==="; git status --short
          echo "[outlook] === staged diff summary ==="; git diff --cached --stat
          echo "[outlook] === unstaged diff summary (expected empty) ==="; git diff --stat

          if git diff --cached --quiet; then
            echo "[outlook] no changes — nothing to commit"
            exit 0
          fi
          git commit -m "Market outlook brain refresh: $(date -u +'%Y-%m-%d %H:%M') UTC"

          # Robust push: rebase onto remote; on artifact drift/conflict regenerate
          # the shared deterministic artifacts, restage, continue. Rebase safety kept.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            if git rebase origin/main; then
              if ! git diff --quiet || ! git diff --cached --quiet; then
                echo "[outlook] residual changes after rebase — restaging"; stage_intended
                git diff --cached --quiet || git commit --amend --no-edit
              fi
              if git push origin main; then
                echo "[outlook] pushed on attempt ${attempt}"; exit 0
              fi
              echo "[outlook] push rejected (race) on attempt ${attempt} — retrying"
            else
              echo "[outlook] rebase conflict on attempt ${attempt} — regenerating shared artifacts to reconcile"
              node tools/generate-seo-sitemaps.js || echo "[outlook] sitemap regen degraded"
              node tools/build-social-intelligence.js --write || echo "[outlook] social regen degraded"
              node tools/build-distribution-plan.js --write || echo "[outlook] distribution regen degraded"
              stage_intended
              git -c core.editor=true rebase --continue || git rebase --abort
            fi
            sleep $((attempt * 3))
          done
          echo "[outlook] push failed after retries"; exit 1
