name: Autonomous Publishing Brain

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Brain mode'
        required: true
        type: choice
        options:
          - status
          - dry_run
          - generate_only
          - publish_ready
          - full_pipeline
        default: status
      content_type:
        description: 'Content type'
        required: true
        type: choice
        options:
          - auto
          - editorial
          - market-outlook
          - news-analysis
          - all
        default: auto
      dry_run:
        description: 'Validate and report without publishing'
        required: true
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'true'
      manual_topic:
        description: 'Optional manual topic candidate; safety gates still apply'
        required: false
        default: ''
      force_content_type:
        description: 'Force requested content type instead of autonomous selection'
        required: false
        type: choice
        options:
          - 'false'
          - 'true'
        default: 'false'
  schedule:
    # Conservative autonomy: scheduled runs report decisions only. Real publishing is manual dispatch.
    - cron: '30 9 * * *'
    - cron: '0 10 * * 1,2,4,6'

permissions:
  contents: write

jobs:
  autonomous-publishing-brain:
    runs-on: ubuntu-latest
    env:
      MODE: ${{ github.event.inputs.mode || 'dry_run' }}
      CONTENT_TYPE: ${{ github.event.inputs.content_type || 'auto' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
      MANUAL_TOPIC: ${{ github.event.inputs.manual_topic || '' }}
      FORCE_CONTENT_TYPE: ${{ github.event.inputs.force_content_type || 'false' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}

    steps:
      - name: Log autonomous publishing context
        run: |
          echo "======================================================"
          echo "  Autonomous Publishing Brain"
          echo "  Mode:               ${MODE}"
          echo "  Content type:       ${CONTENT_TYPE}"
          echo "  Dry run:            ${DRY_RUN}"
          echo "  Manual topic:       ${MANUAL_TOPIC:-'(none)'}"
          echo "  Force content type: ${FORCE_CONTENT_TYPE}"
          echo "  Trigger:            ${{ github.event_name }}"
          echo "  Run ID:             ${{ github.run_id }}"
          echo "======================================================"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Bilingual structural integrity check (preflight)
        run: |
          if ! node tools/check-bilingual-structure.js; then
            echo "[bilingual] Mismatch detected — running auto-sync for affected slugs..."
            node -e "
              const fs = require('fs'), path = require('path');
              const DRAFTS = 'drafts/editorial';
              if (!fs.existsSync(DRAFTS)) process.exit(0);
              const slugs = fs.readdirSync(DRAFTS).filter(d => fs.statSync(path.join(DRAFTS, d)).isDirectory());
              for (const slug of slugs) {
                const { spawnSync } = require('child_process');
                const r = spawnSync('node', ['tools/check-bilingual-structure.js', '--slug=' + slug, '--drafts-only'], {encoding:'utf8'});
                if (r.status !== 0) {
                  console.log('[bilingual] Auto-syncing: ' + slug);
                  spawnSync('node', ['tools/sync-bilingual-article-structure.js', '--slug=' + slug, '--remove-orphans', '--write'], {stdio:'inherit'});
                }
              }
            "
            echo "[bilingual] Re-validating after auto-sync..."
            node tools/check-bilingual-structure.js
          fi
          echo "[bilingual] Bilingual structural integrity verified."

      - name: Preflight production gates
        run: |
          npm run check:editorial
          npm run check:language-purity
          npm run check:production
          npm run check:seo
          npm run check:indexing
          npm run check:social-meta

      - name: Rebuild knowledge graph (ensure graph is current before brain run)
        run: |
          node tools/build-content-knowledge-graph.js --write
          node tools/build-article-pairs.js --write
          node tools/analyze-content-clusters.js --write
          node tools/detect-orphan-pages.js --write

      - name: Fetch live economic calendar
        continue-on-error: true
        run: |
          if [ -n "${FMP_API_KEY}" ]; then
            node tools/update-economic-calendar.js --fetch --write || {
              echo "[calendar] provider unavailable — entering degraded intelligence mode"
              echo "[calendar] continuing pipeline with empty calendar dataset"
            }
            echo "[calendar] Calendar step complete (degraded mode may be active)."
          else
            echo "[calendar] FMP_API_KEY not configured — retaining the checked-in calendar."
          fi
          node tools/build-market-expectations.js --write || echo "[calendar] build-market-expectations degraded — continuing"
          node tools/build-cross-asset-reaction.js --write || echo "[calendar] build-cross-asset-reaction degraded — continuing"

      - name: Build macro reaction intelligence
        continue-on-error: true
        run: |
          node tools/build-event-reaction-memory.js --write || echo "[macro] Event reaction memory degraded — continuing in limited macro intelligence mode"
          echo "[macro] Event reaction memory step complete."

      - name: Build institutional depth intelligence
        run: |
          node tools/detect-market-regime.js --write
          echo "[regime] Market regime detected and written."
          node tools/build-cross-asset-transmission.js --write
          echo "[transmission] Cross-asset transmission engine updated."
          node tools/build-etf-flow-intelligence.js --write
          echo "[etf-flow] ETF flow intelligence updated."
          node tools/build-rate-path-intelligence.js --write
          echo "[rate-path] Rate path intelligence updated."

      - name: Generate macro narrative
        run: |
          node tools/generate-macro-narrative.js --write
          echo "[macro] Institutional macro narrative updated."

      - name: Generate market outlook pages
        if: ${{ env.MODE == 'full_pipeline' || env.MODE == 'generate_only' }}
        run: |
          node tools/generate-daily-market-outlook.js --write
          node tools/generate-daily-market-outlook.js --mode=weekly --write
          echo "[outlook] Daily and weekly institutional outlook pages generated."

      - name: Validate intelligence and generated pages
        run: |
          npm run check:macro-intelligence
          npm run check:bilingual-structure
          npm run check:editorial
          npm run check:language-purity
          npm run check:production
          npm run check:seo
          npm run check:indexing
          npm run check:social-meta

      - name: Run autonomous publishing brain
        run: |
          node tools/autonomous-publishing-brain.js \
            --mode="${MODE}" \
            --content-type="${CONTENT_TYPE}" \
            --dry-run="${DRY_RUN}" \
            --manual-topic="${MANUAL_TOPIC}" \
            --force-content-type="${FORCE_CONTENT_TYPE}"

      - name: Validate generated changes
        if: ${{ env.DRY_RUN == 'false' && env.MODE != 'status' && env.MODE != 'dry_run' }}
        run: |
          npm run check:editorial
          npm run check:language-purity
          npm run check:production
          npm run check:seo
          npm run check:indexing
          npm run check:social-meta

      - name: Diagnose publishing git state
        if: ${{ env.DRY_RUN == 'false' && env.MODE != 'status' && env.MODE != 'dry_run' }}
        run: |
          echo "======================================================"
          echo "  Publishing git diagnostics before commit"
          echo "======================================================"
          pwd
          git status --short
          git diff --stat
          git ls-files insights/healthcare-etf-research-guide.html
          git ls-files ar/insights/healthcare-etf-research-guide.html
          git ls-files en/insights/healthcare-etf-research-guide.html
          ls -la insights/healthcare-etf-research-guide.html || true
          ls -la ar/insights/healthcare-etf-research-guide.html || true
          ls -la en/insights/healthcare-etf-research-guide.html || true
          git rev-parse --abbrev-ref HEAD
          echo "--- ref context ---"
          echo "GITHUB_REF=${GITHUB_REF}"
          echo "GITHUB_REF_NAME=${GITHUB_REF_NAME}"
          echo "GITHUB_SHA=${GITHUB_SHA}"
          echo "--- git status --short ---"
          git status --short
          echo "--- git diff --stat ---"
          git diff --stat
          echo "--- git diff --cached --stat ---"
          git diff --cached --stat
          echo "--- healthcare insight files ---"
          ls insights | grep healthcare || true
          ls ar/insights | grep healthcare || true
          ls en/insights | grep healthcare || true
          echo "--- ignored publish outputs ---"
          git check-ignore -v \
            insights/healthcare-etf-research-guide.html \
            ar/insights/healthcare-etf-research-guide.html \
            en/insights/healthcare-etf-research-guide.html \
            data/localization/ar-insight-content/healthcare-etf-research-guide.json \
            sitemap-insights.xml \
            data/search-index.json || true
          echo "--- tracked healthcare outputs ---"
          git ls-files \
            insights/healthcare-etf-research-guide.html \
            ar/insights/healthcare-etf-research-guide.html \
            en/insights/healthcare-etf-research-guide.html \
            data/localization/ar-insight-content/healthcare-etf-research-guide.json \
            drafts/editorial/healthcare-etf-research-guide/en.html || true
          echo "======================================================"

      - name: Verify published files exist in checkout
        if: ${{ env.DRY_RUN == 'false' && env.MODE != 'status' && env.MODE != 'dry_run' }}
        run: |
          missing=0
          for file in \
            insights/healthcare-etf-research-guide.html \
            ar/insights/healthcare-etf-research-guide.html \
            en/insights/healthcare-etf-research-guide.html
          do
            if [ ! -f "$file" ]; then
              echo "Missing expected published file in repo working tree: $file"
              missing=1
            else
              echo "Found published file in repo working tree: $file"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Publish command did not leave expected files inside the checked-out repository."
            exit 1
          fi

      - name: Commit publishing changes
        if: ${{ env.DRY_RUN == 'false' && env.MODE != 'status' && env.MODE != 'dry_run' }}
        run: |
          git config user.name "tradealphaai-bot"
          git config user.email "actions@users.noreply.github.com"
          git add insights ar/insights en/insights data || true
          git add drafts market-outlook ar/market-outlook en/market-outlook || true
          git add economic-calendar ar/economic-calendar || true
          git add market-outlook/daily market-outlook/weekly || true
          git add data/intelligence || true
          compgen -G "sitemap*.xml" > /dev/null && git add sitemap*.xml || true
          compgen -G "search-index*.json" > /dev/null && git add search-index*.json || true
          compgen -G "article-registry*.json" > /dev/null && git add article-registry*.json || true
          git add -f \
            insights/healthcare-etf-research-guide.html \
            ar/insights/healthcare-etf-research-guide.html \
            en/insights/healthcare-etf-research-guide.html
          echo "--- git status after staging ---"
          git status --short
          echo "--- staged diff after staging ---"
          git diff --cached --stat
          if git diff --cached --quiet; then
            echo "Publish workflow produced files, but git has no staged changes after explicit git add."
            echo "This usually means the generated files are byte-for-byte identical to HEAD or were not written in this checkout."
            exit 1
          else
            git commit -m "Autonomous publishing update [full_pipeline]"
            git push origin "${GITHUB_REF_NAME}"
          fi
