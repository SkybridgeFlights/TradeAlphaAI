name: Autonomous Publishing Brain

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Brain mode'
        required: true
        type: choice
        options:
          - status
          - dry_run
          - generate_only
          - publish_ready
          - full_pipeline
        default: status
      content_type:
        description: 'Content type'
        required: true
        type: choice
        options:
          - auto
          - editorial
          - market-outlook
          - continuous-intelligence
          - news-analysis
          - all
        default: auto
      dry_run:
        description: 'Validate and report without publishing'
        required: true
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'true'
      manual_topic:
        description: 'Optional manual topic candidate; safety gates still apply'
        required: false
        default: ''
      force_content_type:
        description: 'Force requested content type instead of autonomous selection'
        required: false
        type: choice
        options:
          - 'false'
          - 'true'
        default: 'false'
  schedule:
    # 09:30 UTC daily — status/dry-run monitoring only
    - cron: '30 9 * * *'
    # 10:00 UTC Mon/Tue/Thu/Sat — autonomous full_pipeline publish run
    - cron: '0 10 * * 1,2,4,6'

permissions:
  contents: write

concurrency:
  group: autonomous-publishing-brain
  cancel-in-progress: false

jobs:
  autonomous-publishing-brain:
    runs-on: ubuntu-latest
    env:
      MODE: ${{ github.event.inputs.mode || (github.event.schedule == '0 10 * * 1,2,4,6' && 'full_pipeline') || 'dry_run' }}
      CONTENT_TYPE: ${{ github.event.inputs.content_type || 'auto' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || (github.event.schedule == '0 10 * * 1,2,4,6' && 'false') || 'true' }}
      MANUAL_TOPIC: ${{ github.event.inputs.manual_topic || '' }}
      FORCE_CONTENT_TYPE: ${{ github.event.inputs.force_content_type || 'false' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}

    steps:
      - name: Log autonomous publishing context
        run: |
          echo "======================================================"
          echo "  [AUTONOMOUS_PIPELINE] Brain starting"
          echo "  Mode:               ${MODE}"
          echo "  Content type:       ${CONTENT_TYPE}"
          echo "  Dry run:            ${DRY_RUN}"
          echo "  Manual topic:       ${MANUAL_TOPIC:-'(none)'}"
          echo "  Force content type: ${FORCE_CONTENT_TYPE}"
          echo "  Trigger:            ${{ github.event_name }}"
          echo "  Schedule expr:      ${{ github.event.schedule }}"
          echo "  Run ID:             ${{ github.run_id }}"
          if [ "${DRY_RUN}" = "false" ] && [ "${MODE}" = "full_pipeline" ]; then
            echo "  [AUTONOMOUS_PIPELINE] REAL PUBLISH RUN — dry_run=false full_pipeline"
          else
            echo "  [AUTONOMOUS_PIPELINE] Monitoring run — no publishing will occur"
          fi
          echo "======================================================"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Bilingual structural integrity check (preflight)
        run: |
          if ! node tools/check-bilingual-structure.js; then
            echo "[bilingual] Mismatch detected — running auto-sync for affected slugs..."
            node -e "
              const fs = require('fs'), path = require('path');
              const DRAFTS = 'drafts/editorial';
              if (!fs.existsSync(DRAFTS)) process.exit(0);
              const slugs = fs.readdirSync(DRAFTS).filter(d => fs.statSync(path.join(DRAFTS, d)).isDirectory());
              for (const slug of slugs) {
                const { spawnSync } = require('child_process');
                const r = spawnSync('node', ['tools/check-bilingual-structure.js', '--slug=' + slug, '--drafts-only'], {encoding:'utf8'});
                if (r.status !== 0) {
                  console.log('[bilingual] Auto-syncing: ' + slug);
                  spawnSync('node', ['tools/sync-bilingual-article-structure.js', '--slug=' + slug, '--remove-orphans', '--write'], {stdio:'inherit'});
                }
              }
            "
            echo "[bilingual] Re-validating after auto-sync..."
            node tools/check-bilingual-structure.js
          fi
          echo "[bilingual] Bilingual structural integrity verified."

      - name: Acquire publishing lock
        if: ${{ env.DRY_RUN == 'false' && env.MODE != 'status' && env.MODE != 'dry_run' }}
        run: |
          run_id="${{ github.run_id }}"
          node -e "
            const { acquire } = require('./tools/publishing-lock');
            const result = acquire({ run_id: '${run_id}', actor: 'github-actions', mode: '${MODE}' });
            if (!result.ok) {
              console.error('[lock] BLOCKED: ' + result.error);
              process.exit(1);
            }
          "
          echo "[lock] Publishing lock acquired for run_id=${run_id}"

      - name: Build run snapshot
        run: |
          node tools/build-run-snapshot.js "${MODE}" "${CONTENT_TYPE}"
          echo "[run-snapshot] Pre-decision snapshot written."

      - name: Fetch economic calendar data
        continue-on-error: true
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          node tools/fetch-economic-calendar.js --write || {
            echo "[calendar] fetch failed — preflight will validate against existing cache"
          }
          echo "[calendar] economic calendar fetch step complete"

      - name: Self-heal missing approved market-outlook drafts
        run: |
          node tools/self-heal-market-outlook-drafts.js
          echo "[DRAFT_SELF_HEAL] preflight self-heal step complete"

      - name: Preflight production gates
        run: |
          npm run check:economic-calendar
          npm run check:market-outlook-queue
          npm run check:market-outlook-localization
          npm run check:editorial
          npm run check:continuous-intelligence
          npm run check:queue-reconciliation
          npm run check:language-purity
          npm run check:dashboard-routes
          npm run check:production
          npm run check:seo
          npm run check:indexing
          npm run check:social-meta
          npm run check:responsive
          npm run check:global-header

      - name: Rebuild knowledge graph (ensure graph is current before brain run)
        run: |
          node tools/build-content-knowledge-graph.js --write
          node tools/build-article-pairs.js --write
          node tools/analyze-content-clusters.js --write
          node tools/detect-orphan-pages.js --write

      - name: Fetch live economic calendar
        continue-on-error: true
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          node tools/fetch-economic-calendar.js --write || {
            echo "[calendar] provider unavailable — retaining existing calendar data"
          }
          echo "[calendar] Provider router complete (FMP > Finnhub > FRED > stale-cache > degraded)."
          node tools/build-market-expectations.js --write || echo "[calendar] build-market-expectations degraded — continuing"
          node tools/build-cross-asset-reaction.js --write || echo "[calendar] build-cross-asset-reaction degraded — continuing"

      - name: Build macro reaction intelligence
        continue-on-error: true
        run: |
          node tools/build-event-reaction-memory.js --write || echo "[macro] Event reaction memory degraded — continuing in limited macro intelligence mode"
          echo "[macro] Event reaction memory step complete."

      - name: Build institutional depth intelligence
        run: |
          node tools/detect-market-regime.js --write
          echo "[regime] Market regime detected and written."
          node tools/build-cross-asset-transmission.js --write
          echo "[transmission] Cross-asset transmission engine updated."
          node tools/build-etf-flow-intelligence.js --write
          echo "[etf-flow] ETF flow intelligence updated."
          node tools/build-rate-path-intelligence.js --write
          echo "[rate-path] Rate path intelligence updated."

      - name: Generate macro narrative
        run: |
          node tools/generate-macro-narrative.js --write
          echo "[macro] Institutional macro narrative updated."

      - name: Build market intelligence context
        run: |
          node tools/build-market-intelligence-context.js --write || echo "[intelligence] Context build degraded — continuing"
          echo "[intelligence] Market intelligence context step complete."

      - name: Build regime engine v2 and visual data
        run: |
          node tools/build-regime-engine-v2.js --write || echo "[regime-v2] Build degraded — continuing"
          node tools/build-historical-intelligence-memory.js --write || echo "[historical-memory] Build degraded — continuing"
          node tools/build-narrative-continuity-engine.js --write || echo "[narrative-continuity] Build degraded — continuing"
          node tools/build-market-narrative-state.js --write || echo "[narrative-state] Build degraded — continuing"
          node tools/build-newswire-events.js --write || echo "[newswire] Build degraded — continuing"
          node tools/build-market-pulse.js --write || echo "[market-pulse] Build degraded — continuing"
          node tools/build-market-cognition.js --write || echo "[cognition] Build degraded — continuing"
          node tools/build-macro-cognition.js --write || echo "[macro-cognition] Build degraded — continuing"
          node tools/build-narrative-convergence.js --write || echo "[convergence] Build degraded — continuing"
          node tools/build-chart-narratives.js --write || echo "[chart-narratives] Build degraded — continuing"
          node tools/build-editorial-market-memory.js --write || echo "[editorial-memory] Build degraded — continuing"
          node tools/build-structural-tension.js --write || echo "[structural-tension] Build degraded — continuing"
          node tools/build-intelligence-briefs.js --write || echo "[product-brief] Build degraded — continuing"
          node tools/build-intraday-brief.js --write || echo "[intraday-brief] Build degraded — continuing"
          node tools/build-social-intelligence.js --write || echo "[social-intelligence] Build degraded — continuing (preview-only layer)"
          node tools/build-editorial-graphics.js --write || echo "[editorial-graphics] Build degraded — continuing (preview-only exports)"
          node tools/render-newsroom-modules.js || echo "[newsroom] Product render degraded — continuing"
          node tools/promote-wire-events.js --write || echo "[wire-promotion] Promotion degraded — continuing"
          node tools/build-visual-intelligence-data.js --write || echo "[visual-data] Build degraded — continuing"
          echo "[phase68/69/74/75] Regime engine v2, historical memory, continuity, market cognition, macro cognition, and visual intelligence data built."

      - name: Generate continuous intelligence topic candidates
        continue-on-error: true
        run: |
          node tools/generate-continuous-intelligence-topic.js --write || echo "[ci-topic] Topic generation degraded — continuing"
          echo "[ci-topic] Continuous intelligence topic generation complete."

      - name: Generate dashboard pages
        run: |
          node tools/generate-dashboard-pages.js || echo "[dashboards] Generation degraded — continuing"
          node tools/apply-global-header.js || echo "[header] Apply degraded — continuing"
          echo "[phase68] Dashboard pages generated and global header applied."

      - name: Generate market outlook pages
        if: ${{ env.MODE == 'full_pipeline' || env.MODE == 'generate_only' }}
        run: |
          node tools/generate-daily-market-outlook.js --write
          node tools/generate-daily-market-outlook.js --mode=weekly --write
          echo "[outlook] Daily and weekly institutional outlook pages generated."

      - name: Validate intelligence and generated pages
        run: |
          npm run check:editorial-personas
          npm run check:narrative-realism
          npm run check:editorial-cadence
          npm run check:editorial-conviction
          npm run check:editorial-visuals
          npm run check:social-intelligence
          npm run check:editorial-graphics
          npm run check:newsroom-intelligence
          npm run check:newsroom-ui
          npm run test:market-cognition
          npm run check:market-cognition
          npm run test:macro-cognition
          npm run check:macro-cognition
          npm run check:live-terminal
          npm run test:narrative-convergence
          npm run check:narrative-convergence
          npm run test:editorial-memory
          npm run check:editorial-memory
          npm run test:structural-tension
          npm run check:structural-tension
          npm run check:intelligence-productization
          npm run test:newsroom-behavior
          npm run check:macro-intelligence
          npm run check:responsive
          npm run check:global-header
          npm run check:bilingual-structure
          npm run check:economic-calendar
          npm run check:market-outlook-queue
          npm run check:market-outlook-localization
          npm run check:editorial
          npm run check:language-purity
          npm run check:dashboard-routes
          npm run check:production
          npm run check:seo
          npm run check:indexing
          npm run check:social-meta

      - name: Run autonomous publishing brain
        run: |
          grep -n "skipRegenDueToRepair\|Skipping post-repair regeneration\|FINAL VALIDATION TARGET" tools/autonomous-publishing-brain.js || { echo "[PREFLIGHT FAIL] repair-ordering fix is missing from brain"; exit 1; }
          echo "[PUBLISH EXECUTION] brain starting mode=${MODE} content_type=${CONTENT_TYPE} dry_run=${DRY_RUN}"
          node tools/autonomous-publishing-brain.js \
            --mode="${MODE}" \
            --content-type="${CONTENT_TYPE}" \
            --dry-run="${DRY_RUN}" \
            --manual-topic="${MANUAL_TOPIC}" \
            --force-content-type="${FORCE_CONTENT_TYPE}"
          echo "[PUBLISH EXECUTION] brain completed exit_code=$?"

      - name: "[brain] Pre-distribution intelligence quality gate"
        if: ${{ env.DRY_RUN == 'false' && env.MODE == 'full_pipeline' }}
        run: |
          slug="$(node -e "try{const r=require('./data/intelligence/publishing-report.json');process.stdout.write(String(r.selected_topic||''))}catch{process.stdout.write('')}" 2>/dev/null || true)"
          if [ -n "$slug" ]; then
            echo "[quality-gate] Checking article quality for: $slug"
            node tools/check-market-intelligence-quality.js --slug="$slug" || echo "[quality-gate] Issues found — see above. CRITICAL will block distribution."
          else
            echo "[quality-gate] No published slug — writing baseline health."
            node -e "const fs=require('fs'),p='data/system-status/intelligence-health.json';fs.mkdirSync(require('path').dirname(p),{recursive:true});fs.writeFileSync(p,JSON.stringify({status:'ok',severity:'OK',reasons:[],issues_by_severity:{INFO:0,WARN:0,ERROR:0,CRITICAL:0},generated_at:new Date().toISOString()},null,2)+'\n','utf8')" || true
          fi

      - name: Update homepage featured content and system status
        if: ${{ always() }}
        run: |
          node tools/update-market-outlook-publication.js
          node tools/update-homepage-featured.js --write
          node tools/generate-system-status.js
          node tools/update-content-feeds.js
          node tools/update-market-intelligence-status.js || echo "[intelligence] Status widget update degraded — continuing"
          node tools/render-newsroom-modules.js || echo "[newsroom] Module render degraded — continuing"
          node tools/apply-global-header.js
          echo "[status] Homepage, newsroom modules, system status, content feeds, and global header updated."

      - name: Update publishing state machine history
        if: ${{ env.DRY_RUN == 'false' && env.MODE != 'status' && env.MODE != 'dry_run' }}
        continue-on-error: true
        run: |
          node -e "
            const { tryTransition } = require('./tools/publishing-state-machine');
            const fs = require('fs');
            let report = {};
            try { report = JSON.parse(fs.readFileSync('data/intelligence/publishing-report.json', 'utf8')); } catch {}
            const slug = report.selected_topic || '';
            const type = report.selected_content_type || 'unknown';
            const published = report.published === true;
            const siteUpdate = report.site_update === true;
            const run_id = '${GITHUB_RUN_ID:-unknown}';
            if (published && slug) {
              tryTransition({ from: 'approved', to: 'published', content_type: type, slug, reason: 'autonomous-publish', run_id });
            } else if (siteUpdate) {
              tryTransition({ from: 'blocked', to: 'site_update_only', content_type: type, slug: slug || 'site', reason: 'no-publish-site-update', run_id });
            } else if (slug) {
              tryTransition({ from: 'planned', to: 'draft', content_type: type, slug, reason: 'draft-generated-or-blocked', run_id });
            }
          " || echo "[state-machine] State history update degraded — continuing"
          echo "[state-machine] Publishing state history updated."

      - name: Validate generated changes
        if: ${{ env.DRY_RUN == 'false' && env.MODE != 'status' && env.MODE != 'dry_run' }}
        run: |
          npm run check:editorial
          npm run check:language-purity
          npm run check:market-outlook-localization
          npm run check:dashboard-routes
          npm run check:featured-links
          npm run check:production
          npm run check:seo
          npm run check:indexing
          npm run check:social-meta
          npm run check:responsive
          npm run check:macro-intelligence
          npm run check:content-feeds
          npm run check:global-header-runtime
          npm run check:intelligence-quality
          npm run check:visual-intelligence || echo "[visual-intelligence] Warning-level issues — see above"
          npm run check:historical-intelligence || echo "[historical-intelligence] Warning-level issues — see above"
          npm run check:continuous-intelligence || echo "[continuous-intelligence] Warning-level issues — see above"
          npm run check:queue-reconciliation || echo "[queue-reconciliation] Warning-level issues — see above"
          npm run check:telegram-ledger || echo "[telegram-ledger] Warning-level issues — see above"
          npm run check:no-orphan-public-files || echo "[orphan-public-files] Orphan files detected — cleanup step will remove before commit"
          echo "[FINAL LOCALIZATION ASSERTION]"
          if grep -R -n -i "Understanding the Two Phases" drafts/ ar/market-outlook/ market-outlook/; then
            echo "[LOCALIZATION FAIL] stale English phrase remains in generated artifacts."
            exit 1
          fi
          echo "[FINAL LOCALIZATION ASSERTION] zero matches"

      - name: Diagnose publishing git state
        if: ${{ env.DRY_RUN == 'false' && env.MODE != 'status' && env.MODE != 'dry_run' }}
        run: |
          echo "======================================================"
          echo "  Publishing git diagnostics before commit"
          echo "======================================================"
          pwd
          git status --short
          git diff --stat
          git ls-files insights/healthcare-etf-research-guide.html
          git ls-files ar/insights/healthcare-etf-research-guide.html
          git ls-files en/insights/healthcare-etf-research-guide.html
          ls -la insights/healthcare-etf-research-guide.html || true
          ls -la ar/insights/healthcare-etf-research-guide.html || true
          ls -la en/insights/healthcare-etf-research-guide.html || true
          git rev-parse --abbrev-ref HEAD
          echo "--- ref context ---"
          echo "GITHUB_REF=${GITHUB_REF}"
          echo "GITHUB_REF_NAME=${GITHUB_REF_NAME}"
          echo "GITHUB_SHA=${GITHUB_SHA}"
          echo "--- git status --short ---"
          git status --short
          echo "--- git diff --stat ---"
          git diff --stat
          echo "--- git diff --cached --stat ---"
          git diff --cached --stat
          echo "--- healthcare insight files ---"
          ls insights | grep healthcare || true
          ls ar/insights | grep healthcare || true
          ls en/insights | grep healthcare || true
          echo "--- ignored publish outputs ---"
          git check-ignore -v \
            insights/healthcare-etf-research-guide.html \
            ar/insights/healthcare-etf-research-guide.html \
            en/insights/healthcare-etf-research-guide.html \
            data/localization/ar-insight-content/healthcare-etf-research-guide.json \
            sitemap-insights.xml \
            data/search-index.json || true
          echo "--- tracked healthcare outputs ---"
          git ls-files \
            insights/healthcare-etf-research-guide.html \
            ar/insights/healthcare-etf-research-guide.html \
            en/insights/healthcare-etf-research-guide.html \
            data/localization/ar-insight-content/healthcare-etf-research-guide.json \
            drafts/editorial/healthcare-etf-research-guide/en.html || true
          echo "======================================================"

      - name: Verify published files exist in checkout
        if: ${{ env.DRY_RUN == 'false' && env.MODE != 'status' && env.MODE != 'dry_run' }}
        run: |
          slug="$(node -e "const r=require('./data/intelligence/publishing-report.json'); process.stdout.write(String(r.selected_topic||''))")"
          type="$(node -e "const r=require('./data/intelligence/publishing-report.json'); process.stdout.write(String(r.selected_content_type||''))")"
          published="$(node -e "const r=require('./data/intelligence/publishing-report.json'); process.stdout.write(r.published===true?'yes':'no')")"
          echo "[PUBLISH REPORT] published=${published} publish_result=$(node -e "const r=require('./data/intelligence/publishing-report.json'); process.stdout.write(String(r.publish_result||''))")"
          if [ "${published}" != "yes" ]; then
            echo "No public publication was reported. Exact reason:"
            node -e "const r=require('./data/intelligence/publishing-report.json'); console.log(r.publish_block_reason||r.publish_result||'not_published')"
            exit 0
          fi
          if [ -z "${slug}" ]; then
            echo "Publication reported success without a selected slug."
            exit 1
          fi
          missing=0
          if [ "${type}" = "editorial" ]; then
            expected="insights/${slug}.html ar/insights/${slug}.html en/insights/${slug}.html"
          elif [ "${type}" = "market-outlook" ]; then
            expected="market-outlook/${slug}.html ar/market-outlook/${slug}.html en/market-outlook/${slug}.html"
          elif [ "${type}" = "continuous-intelligence" ]; then
            expected="intelligence/${slug}.html en/intelligence/${slug}.html ar/intelligence/${slug}.html"
          else
            echo "Unsupported published content type for artifact verification: ${type}"
            exit 1
          fi
          for file in ${expected}
          do
            if [ ! -f "$file" ]; then
              echo "Missing expected published file in repo working tree: $file"
              missing=1
            else
              echo "Found published file in repo working tree: $file"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Publish command did not leave expected files inside the checked-out repository."
            exit 1
          fi

      - name: Cleanup orphan public article files
        if: ${{ env.DRY_RUN == 'false' && env.MODE != 'status' && env.MODE != 'dry_run' }}
        run: |
          node tools/cleanup-orphan-public-files.js --execute
          echo "[cleanup] Orphan public article file cleanup complete."

      - name: "[PUBLISH_VERIFY] Hard publish integrity gate"
        if: ${{ env.DRY_RUN == 'false' && env.MODE != 'status' && env.MODE != 'dry_run' }}
        run: |
          # Final gate after every mutation step (including orphan cleanup):
          # if the report claims published=true, the EN/AR pages must still
          # exist and be complete. Fails the run BEFORE commit and Telegram.
          node tools/verify-publish-integrity.js

      - name: Commit publishing changes
        if: ${{ env.DRY_RUN == 'false' && env.MODE != 'status' && env.MODE != 'dry_run' }}
        run: |
          git config user.name "tradealphaai-bot"
          git config user.email "actions@users.noreply.github.com"
          stage_paths() {
            for path in "$@"; do
              if [ -e "$path" ]; then
                git add -- "$path"
                echo "[staging] added: $path"
              else
                echo "[staging] skipped missing path: $path"
              fi
            done
          }
          stage_glob() {
            pattern="$1"
            found=0
            for path in $pattern; do
              if [ -e "$path" ]; then
                git add -- "$path"
                echo "[staging] added: $path"
                found=1
              fi
            done
            if [ "$found" -eq 0 ]; then
              echo "[staging] skipped missing path: $pattern"
            fi
          }
          slug="$(node -e "const r=require('./data/intelligence/publishing-report.json'); process.stdout.write(String(r.selected_topic||''))")"
          type="$(node -e "const r=require('./data/intelligence/publishing-report.json'); process.stdout.write(String(r.selected_content_type||''))")"
          published="$(node -e "const r=require('./data/intelligence/publishing-report.json'); process.stdout.write(r.published===true?'yes':'no')")"
          site_update="$(node -e "const r=require('./data/intelligence/publishing-report.json'); process.stdout.write(r.site_update===true?'yes':'no')")"
          commit_allowed="$(node -e "const r=require('./data/intelligence/publishing-report.json'); process.stdout.write(r.commit_allowed===true?'yes':'no')")"
          health_status="$(node -e "try{const h=JSON.parse(require('fs').readFileSync('data/system-status/intelligence-health.json','utf8'));process.stdout.write(h.status||'ok')}catch{process.stdout.write('ok')}" 2>/dev/null || echo 'ok')"
          echo "[PUBLISH REPORT] published=${published} site_update=${site_update} commit_allowed=${commit_allowed} health=${health_status} publish_result=$(node -e "const r=require('./data/intelligence/publishing-report.json'); process.stdout.write(String(r.publish_result||''))")"
          if [ "$health_status" = "critical" ] && [ "${published}" = "yes" ]; then
            echo "[commit] BLOCKED — CRITICAL intelligence quality. Article generated but NOT committed to main."
            echo "[commit] Fix quality issues and re-run, or manually review and commit."
            exit 0
          fi
          if [ "${published}" != "yes" ]; then
            if [ "${MODE}" = "generate_only" ]; then
              stage_paths "drafts/${type}/${slug}" data/editorial-topic-queue.json data/market-outlook-queue.json data/continuous-intelligence-queue.json data/intelligence
              commit_message="Draft generated ${slug}"
            elif [ "${site_update}" = "yes" ]; then
              if [ "${commit_allowed}" != "yes" ]; then
                echo "Skipping commit: site-update path produced no file changes."
                exit 0
              fi
              stage_paths data/intelligence data/visual data/feeds data/system-status data/newswire
              stage_paths data/continuous-intelligence-queue.json data/continuous-intelligence-history.json
              stage_paths market-dashboard ar/market-dashboard macro-dashboard ar/macro-dashboard etf-dashboard ar/etf-dashboard
              stage_paths market-replay ar/market-replay intelligence ar/intelligence en/intelligence system-status
              stage_paths market-outlook/daily market-outlook/weekly ar/market-outlook/daily ar/market-outlook/weekly
              stage_paths index.html ar/index.html market-outlook/index.html ar/market-outlook/index.html intelligence/index.html ar/intelligence/index.html
              stage_paths js/visual-intelligence.js js/market-replay.js css/visual-intelligence.css css/newsroom.css
              stage_glob "sitemap*.xml"
              commit_message="Autonomous site intelligence update"
            else
              echo "Skipping commit: no public publication occurred."
              echo "Reason: $(node -e "const r=require('./data/intelligence/publishing-report.json'); process.stdout.write(String(r.publish_block_reason||r.publish_result||'not_published'))")"
              exit 0
            fi
          else
            stage_paths insights ar/insights en/insights market-outlook ar/market-outlook en/market-outlook
            stage_paths intelligence ar/intelligence en/intelligence
            stage_paths data/editorial-topic-queue.json data/market-outlook-queue.json data/published-history.json data/market-outlook-history.json
            stage_paths data/continuous-intelligence-queue.json data/continuous-intelligence-history.json
            stage_paths data/intelligence/publishing-state-history.json data/intelligence/run-snapshot.json data/intelligence/publication-transaction.json
            stage_paths data/insights data/search-index.json data/localization data/intelligence/publishing-report.json data/intelligence/publication-confidence.json
            stage_paths data/newswire
            stage_paths data/intelligence/market-intelligence-context.json data/intelligence/regime-engine-v2.json data/visual
            stage_paths market-dashboard ar/market-dashboard macro-dashboard ar/macro-dashboard etf-dashboard ar/etf-dashboard
            stage_paths js/visual-intelligence.js css/visual-intelligence.css js/market-replay.js css/newsroom.css
            stage_paths market-replay ar/market-replay
            stage_paths data/intelligence/historical-memory.json data/intelligence/narrative-continuity.json data/intelligence/editorial-market-memory.json data/intelligence/structural-tension.json
            stage_paths data/system-status/market-intelligence-status.json data/system-status/intelligence-health.json
            stage_paths logs/intelligence-quality-history.json data/feeds data/narrative-memory.json
            stage_paths data/telegram-delivery-ledger.json
            stage_paths market-outlook/index.html ar/market-outlook/index.html intelligence/index.html ar/intelligence/index.html system-status
            stage_paths sitemap-core.xml sitemap-market.xml index.html ar/index.html
            stage_glob "sitemap*.xml"
            commit_message="Autonomous publish ${slug}"
          fi
          echo "--- git status after staging ---"
          git status --short
          echo "--- staged diff after staging ---"
          git diff --cached --stat
          if git diff --cached --quiet; then
            echo "No intended publishing changes to commit."
            exit 0
          else
            git commit -m "${commit_message}"
            git push origin "${GITHUB_REF_NAME}"
          fi

      - name: Telegram secrets preflight
        if: ${{ env.DRY_RUN == 'false' && env.MODE == 'full_pipeline' }}
        continue-on-error: true
        run: |
          published="$(node -e "try{const r=require('./data/intelligence/publishing-report.json');process.stdout.write(r.published===true?'yes':'no')}catch{process.stdout.write('no')}")"
          if [ "${published}" = "yes" ]; then
            echo "[TELEGRAM PREFLIGHT] published=true — verifying secrets before delivery..."
            npm run check:telegram-secrets
          else
            echo "[TELEGRAM PREFLIGHT] published=false — skipping secrets check"
          fi

      - name: Send Telegram delivery (post-commit, deploy-verified)
        if: ${{ env.DRY_RUN == 'false' && env.MODE == 'full_pipeline' }}
        continue-on-error: true
        run: |
          published="$(node -e "try{const r=require('./data/intelligence/publishing-report.json');process.stdout.write(r.published===true?'yes':'no')}catch{process.stdout.write('no')}")"
          slug="$(node -e "try{const r=require('./data/intelligence/publishing-report.json');process.stdout.write(String(r.selected_topic||''))}catch{process.stdout.write('')}")"
          type="$(node -e "try{const r=require('./data/intelligence/publishing-report.json');process.stdout.write(String(r.selected_content_type||''))}catch{process.stdout.write('')}")"
          pages="$(node -e "try{const r=require('./data/intelligence/publishing-report.json');process.stdout.write(String((r.public_pages_created||[]).length))}catch{process.stdout.write('0')}")"
          echo "[TELEGRAM DELIVERY] published=${published} slug=${slug} type=${type} pages=${pages}"
          if [ "${published}" != "yes" ]; then
            echo "[TELEGRAM DELIVERY] skipped — published=false"
            exit 0
          fi
          if [ -z "${slug}" ] || [ -z "${type}" ]; then
            echo "[TELEGRAM DELIVERY] skipped — slug or content_type missing from publishing report"
            exit 0
          fi
          if [ "${type}" = "site_update_only" ]; then
            echo "[TELEGRAM DELIVERY] skipped — site_update_only is not distributed"
            exit 0
          fi
          if [ "${pages}" = "0" ]; then
            echo "[TELEGRAM DELIVERY] skipped — public_pages_created is empty"
            exit 0
          fi
          # Verify pages exist in the committed tree before announcing
          node tools/verify-publish-integrity.js || {
            echo "[TELEGRAM DELIVERY] skipped — publish integrity verification failed"
            exit 0
          }
          # Wait for the deployed URL to stop returning 404 before announcing
          # (Vercel deploys the commit pushed in the previous step).
          if [ "${type}" = "market-outlook" ]; then live_path="market-outlook/${slug}.html";
          elif [ "${type}" = "editorial" ]; then live_path="insights/${slug}.html";
          else live_path="intelligence/${slug}.html"; fi
          live_url="https://www.tradealphaai.com/${live_path}"
          deployed=no
          for attempt in $(seq 1 20); do
            code="$(curl -s -o /dev/null -w '%{http_code}' "${live_url}" || echo 000)"
            echo "[TELEGRAM DELIVERY] deploy check ${attempt}/20: ${live_url} -> ${code}"
            if [ "${code}" = "200" ]; then deployed=yes; break; fi
            sleep 15
          done
          if [ "${deployed}" != "yes" ]; then
            echo "[TELEGRAM DELIVERY] skipped — live URL not serving 200 after wait; telegram-backfill can deliver later"
            exit 0
          fi
          if [ -n "${TELEGRAM_BOT_TOKEN}" ] && { [ -n "${TELEGRAM_CHAT_ID}" ] || [ -n "${TELEGRAM_CHANNEL_ID}" ]; }; then
            node tools/send-published-article-telegram.js \
              --slug="${slug}" \
              --content-type="${type}" \
              --source=primary \
              --send
          else
            echo "[TELEGRAM DELIVERY] credentials unavailable — skipping primary delivery"
          fi

      - name: Commit Telegram delivery ledger
        if: ${{ env.DRY_RUN == 'false' && env.MODE == 'full_pipeline' }}
        continue-on-error: true
        run: |
          if git diff --quiet -- data/telegram-delivery-ledger.json; then
            echo "[ledger] No Telegram ledger changes to commit."
            exit 0
          fi
          git config user.name "tradealphaai-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -- data/telegram-delivery-ledger.json
          git commit -m "Telegram delivery ledger update"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin "${GITHUB_REF_NAME}"

      - name: Release publishing lock
        if: ${{ always() && env.DRY_RUN == 'false' && env.MODE != 'status' && env.MODE != 'dry_run' }}
        run: |
          run_id="${{ github.run_id }}"
          node -e "
            const { release } = require('./tools/publishing-lock');
            release({ run_id: '${run_id}' });
          " || echo "[lock] Lock release degraded — may need manual force-release"
          echo "[lock] Publishing lock released for run_id=${run_id}"
